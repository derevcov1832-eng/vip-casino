<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🎡 Рулетка</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            background: linear-gradient(145deg, #1a0a0a, #3a1a1a, #1a0a0a);
            color: white;
            position: relative;
            overflow: hidden;
        }
        body::before {
            content: '';
            position: absolute;
            top: -30%;
            left: -20%;
            width: 140%;
            height: 140%;
            background: radial-gradient(ellipse at 30% 40%, rgba(255, 50, 50, 0.08) 0%, transparent 60%),
                radial-gradient(ellipse at 70% 60%, rgba(255, 180, 50, 0.06) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }
        .container {
            position: relative;
            z-index: 1;
            max-width: 480px;
            width: 100%;
            text-align: center;
        }
        .back-btn {
            display: inline-block;
            color: rgba(255, 255, 255, 0.5);
            text-decoration: none;
            font-size: 15px;
            padding: 8px 20px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 40px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(8px);
            transition: 0.25s;
            margin-bottom: 10px;
        }
        .back-btn:active {
            transform: scale(0.94);
            background: rgba(255, 255, 255, 0.08);
        }
        .header h2 {
            font-size: 30px;
            font-weight: 700;
            letter-spacing: 1px;
            background: linear-gradient(135deg, #ff6b6b, #ff4757);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 2px;
        }
        .header .sub {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.35);
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 12px;
        }
        .balance {
            font-size: 24px;
            font-weight: 600;
            color: #f7e3a0;
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(12px);
            padding: 12px 28px;
            border-radius: 60px;
            display: inline-block;
            border: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.3);
            margin-bottom: 16px;
            letter-spacing: 1px;
        }

        /* ===== КОЛЕСО РУЛЕТКИ ===== */
        .wheel-container {
            position: relative;
            width: 280px;
            height: 280px;
            margin: 10px auto;
        }
        .wheel {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            position: relative;
            transition: transform 4s cubic-bezier(0.17, 0.67, 0.12, 0.99);
            box-shadow: 0 0 60px rgba(255, 50, 50, 0.15), 0 0 120px rgba(255, 50, 50, 0.05);
            border: 4px solid rgba(255, 215, 100, 0.3);
        }
        .wheel.spinning {
            transition: transform 4s cubic-bezier(0.17, 0.67, 0.12, 0.99);
        }
        .wheel-segment {
            position: absolute;
            width: 50%;
            height: 50%;
            top: 0;
            left: 50%;
            transform-origin: 0% 100%;
            clip-path: polygon(0 0, 100% 0, 50% 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            font-weight: bold;
            color: white;
            text-shadow: 0 1px 3px rgba(0, 0, 0, 0.5);
        }
        .wheel-center {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 50px;
            height: 50px;
            background: radial-gradient(circle, #f7d44a, #b8860b);
            border-radius: 50%;
            border: 3px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 0 30px rgba(247, 212, 74, 0.2);
            z-index: 10;
        }
        .wheel-center::after {
            content: '★';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 20px;
            color: #1a1a2e;
        }
        .wheel-arrow {
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 40px;
            color: #f7d44a;
            z-index: 20;
            filter: drop-shadow(0 0 20px rgba(247, 212, 74, 0.3));
        }

        /* ===== РЕЗУЛЬТАТ ===== */
        .result {
            font-size: 26px;
            font-weight: 600;
            margin: 12px 0;
            min-height: 48px;
            letter-spacing: 0.5px;
        }
        .result .number {
            font-size: 48px;
            font-weight: 800;
        }
        .result .color-text {
            font-size: 20px;
            margin-top: 4px;
        }
        .result .color-text.red {
            color: #e74c3c;
        }
        .result .color-text.black {
            color: #bdc3c7;
        }
        .result .color-text.green {
            color: #2ecc71;
        }

        /* ===== СТАВКА ===== */
        .bet-settings {
            display: flex;
            gap: 12px;
            align-items: center;
            justify-content: center;
            margin: 12px 0 10px;
            flex-wrap: wrap;
        }
        .bet-settings label {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.5);
            letter-spacing: 1px;
        }
        .bet-settings input {
            width: 110px;
            padding: 12px 8px;
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            font-size: 17px;
            font-weight: 600;
            text-align: center;
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(8px);
            color: #f0e8d0;
            transition: 0.2s;
        }
        .bet-settings input:focus {
            outline: none;
            border-color: rgba(255, 215, 100, 0.25);
            background: rgba(255, 255, 255, 0.07);
        }

        .buttons {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
            margin: 16px 0 8px;
        }
        button {
            padding: 15px 28px;
            border: none;
            border-radius: 60px;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            flex: 1;
            min-width: 100px;
            letter-spacing: 0.5px;
            backdrop-filter: blur(8px);
            box-shadow: 0 6px 24px rgba(0, 0, 0, 0.2);
        }
        button:active {
            transform: scale(0.94);
        }
        button:disabled {
            opacity: 0.3;
            transform: none !important;
            cursor: not-allowed;
        }
        .btn-red {
            background: linear-gradient(145deg, #e74c3c, #c0392b);
            color: #fff;
        }
        .btn-black {
            background: linear-gradient(145deg, #2c3e50, #1a252f);
            color: #fff;
        }
        .btn-green {
            background: linear-gradient(145deg, #2ecc71, #27ae60);
            color: #fff;
        }
        .btn-number {
            background: linear-gradient(145deg, #9b59b6, #8e44ad);
            color: #fff;
        }

        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(12, 14, 28, 0.92);
            backdrop-filter: blur(16px);
            color: #f0eee0;
            padding: 14px 28px;
            border-radius: 60px;
            display: none;
            z-index: 999;
            max-width: 90%;
            border: 1px solid rgba(255, 255, 255, 0.05);
            font-size: 16px;
            font-weight: 500;
            box-shadow: 0 16px 50px rgba(0, 0, 0, 0.5);
            letter-spacing: 0.3px;
        }
        .toast.show {
            display: block;
            animation: slideDown 0.35s ease-out;
        }
        @keyframes slideDown {
            from {
                top: -60px;
                opacity: 0;
            }
            to {
                top: 20px;
                opacity: 1;
            }
        }

        .footer {
            margin-top: 16px;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.12);
            letter-spacing: 2px;
        }

        @media (max-width: 450px) {
            .wheel-container {
                width: 220px;
                height: 220px;
            }
            .wheel-center {
                width: 40px;
                height: 40px;
            }
            .wheel-center::after {
                font-size: 16px;
            }
            .result .number {
                font-size: 38px;
            }
            button {
                font-size: 15px;
                padding: 13px 16px;
                min-width: 70px;
            }
            .balance {
                font-size: 20px;
                padding: 10px 22px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-btn">← Назад</a>
        <div class="header">
            <h2>🎡 Рулетка</h2>
            <div class="sub">Крути колесо и выигрывай!</div>
        </div>
        <div class="balance" id="balanceDisplay">💰 1000</div>

        <div class="wheel-container">
            <div class="wheel-arrow">▼</div>
            <div class="wheel" id="wheel"></div>
            <div class="wheel-center"></div>
        </div>

        <div class="result" id="rouletteResult">
            <div class="number">🎯</div>
            <div class="color-text">Сделай ставку</div>
        </div>

        <div class="bet-settings">
            <label>💰 Ставка</label>
            <input type="number" id="betInput" value="50" min="10" step="10">
        </div>

        <div class="buttons">
            <button class="btn-red" onclick="spinRoulette('red')" id="btnRed">🔴 Красное (x2)</button>
            <button class="btn-black" onclick="spinRoulette('black')" id="btnBlack">⚫ Чёрное (x2)</button>
            <button class="btn-green" onclick="spinRoulette('green')" id="btnGreen">🟢 Зеро (x35)</button>
            <button class="btn-number" onclick="spinRoulette('number')" id="btnNumber">🎯 Число (x35)</button>
        </div>

        <div class="footer">Красное/Чёрное = x2 | Зеро/Число = x35</div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        // ============================
        // 1. БАЛАНС
        // ============================
        let balance = parseInt(localStorage.getItem('casinoBalance')) || 1000;
        updateBalanceDisplay();

        function updateBalanceDisplay() {
            document.getElementById('balanceDisplay').textContent = '💰 ' + balance;
            localStorage.setItem('casinoBalance', balance);
        }

        function showToast(msg, isWin = true) {
            const t = document.getElementById('toast');
            t.innerHTML = msg;
            t.style.borderColor = isWin ? 'rgba(46,204,113,0.2)' : 'rgba(231,76,60,0.2)';
            t.classList.add('show');
            clearTimeout(t._timeout);
            t._timeout = setTimeout(() => {
                t.innerHTML = '';
                t.classList.remove('show');
            }, 3000);
        }

        // ============================
        // 2. ЗВУКИ
        // ============================
        function playWinSound() {
            try {
                const ctx = new(window.AudioContext || window.webkitAudioContext)();
                const notes = [523, 659, 784];
                notes.forEach((freq, i) => {
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.connect(gain);
                    gain.connect(ctx.destination);
                    osc.frequency.value = freq;
                    osc.type = 'sine';
                    gain.gain.value = 0.10;
                    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.25 + i * 0.12);
                    osc.start(ctx.currentTime + i * 0.12);
                    osc.stop(ctx.currentTime + 0.3 + i * 0.12);
                });
            } catch (_) {}
        }

        function playLoseSound() {
            try {
                const ctx = new(window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.frequency.value = 340;
                osc.type = 'sine';
                gain.gain.value = 0.09;
                gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.6);
                osc.start(ctx.currentTime);
                osc.stop(ctx.currentTime + 0.6);
            } catch (_) {}
        }

        function playSpinSound() {
            try {
                const ctx = new(window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.frequency.value = 800;
                osc.type = 'sine';
                gain.gain.value = 0.05;
                gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.08);
                osc.start(ctx.currentTime);
                osc.stop(ctx.currentTime + 0.08);
            } catch (_) {}
        }

        // ============================
        // 3. СОЗДАНИЕ КОЛЕСА
        // ============================
        const numbers = [0, 32, 15, 19, 4, 21, 2, 25, 17, 34, 6, 27, 13, 36, 11, 30, 8, 23, 10, 5, 24, 16, 33, 1, 20, 14, 31,
            9, 22, 18, 29, 7, 28, 12, 35, 3, 26
        ];
        const colors = ['green', 'red', 'black', 'red', 'black', 'red', 'black', 'red', 'black', 'red', 'black', 'red',
            'black', 'red', 'black', 'red', 'black', 'red', 'black', 'red', 'black', 'red', 'black', 'red', 'black',
            'red', 'black', 'red', 'black', 'red', 'black', 'red', 'black', 'red', 'black', 'red', 'black'
        ];

        const wheel = document.getElementById('wheel');
        const segmentCount = numbers.length;
        const angleStep = 360 / segmentCount;

        numbers.forEach((num, i) => {
            const seg = document.createElement('div');
            seg.className = 'wheel-segment';
            const color = colors[i];
            seg.style.backgroundColor = color === 'red' ? '#e74c3c' : color === 'black' ? '#2c3e50' : '#2ecc71';
            seg.style.transform = `rotate(${i * angleStep}deg)`;
            seg.innerHTML = `<span style="transform: rotate(90deg); font-size: 11px; margin-left: 20px;">${num}</span>`;
            wheel.appendChild(seg);
        });

        // ============================
        // 4. ИГРА
        // ============================
        let isSpinning = false;
        let currentRotation = 0;

        function spinRoulette(betType) {
            if (isSpinning) return;
            const bet = parseInt(document.getElementById('betInput').value) || 50;
            if (balance < bet) {
                showToast('❌ Недостаточно монет!', false);
                return;
            }

            isSpinning = true;
            document.getElementById('btnRed').disabled = true;
            document.getElementById('btnBlack').disabled = true;
            document.getElementById('btnGreen').disabled = true;
            document.getElementById('btnNumber').disabled = true;

            balance -= bet;
            updateBalanceDisplay();
            playSpinSound();

            const num = Math.floor(Math.random() * 37);
            const color = num === 0 ? 'зелёный' : (num % 2 === 0 ? 'красный' : 'чёрный');

            const winIndex = numbers.indexOf(num);
            const winAngle = winIndex * angleStep + angleStep / 2;
            const extraSpins = 5 + Math.floor(Math.random() * 5);
            const targetRotation = 360 * extraSpins + (360 - winAngle);

            currentRotation += targetRotation;
            wheel.style.transform = `rotate(${currentRotation}deg)`;
            wheel.classList.add('spinning');

            setTimeout(() => {
                wheel.classList.remove('spinning');

                let isWin = false;
                let winAmount = 0;

                if (betType === 'red' && color === 'красный') {
                    isWin = true;
                    winAmount = bet * 2;
                } else if (betType === 'black' && color === 'чёрный') {
                    isWin = true;
                    winAmount = bet * 2;
                } else if (betType === 'green' && num === 0) {
                    isWin = true;
                    winAmount = bet * 35;
                } else if (betType === 'number') {
                    const guess = prompt('Введи число от 0 до 36:', '7');
                    if (guess !== null && parseInt(guess) === num) {
                        isWin = true;
                        winAmount = bet * 35;
                    }
                }

                const colorClass = color === 'красный' ? 'red' : (color === 'чёрный' ? 'black' : 'green');
                const colorEmoji = color === 'красный' ? '🔴' : (color === 'чёрный' ? '⚫' : '🟢');

                document.getElementById('rouletteResult').innerHTML = `
                    <div class="number">${num}</div>
                    <div class="color-text ${colorClass}">${colorEmoji} ${color.toUpperCase()}</div>
                `;

                if (isWin) {
                    balance += winAmount;
                    updateBalanceDisplay();
                    showToast('🎉 Выиграл ' + winAmount + ' монет!', true);
                    playWinSound();
                } else {
                    showToast('😢 Проиграл ' + bet + ' монет', false);
                    playLoseSound();
                }

                isSpinning = false;
                document.getElementById('btnRed').disabled = false;
                document.getElementById('btnBlack').disabled = false;
                document.getElementById('btnGreen').disabled = false;
                document.getElementById('btnNumber').disabled = false;
            }, 4200);
        }

        // ============================
        // 5. СТАРТ
        // ============================
        document.getElementById('rouletteResult').innerHTML = `
            <div class="number">🎯</div>
            <div class="color-text">Сделай ставку</div>
        `;
        if (balance === 1000) {
            setTimeout(() => showToast('🎡 Добро пожаловать в рулетку!', true), 400);
        }
    </script>
</body>
</html>
