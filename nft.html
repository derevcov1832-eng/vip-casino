<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>💎 Хранилище NFT</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh;
            background: linear-gradient(145deg, #0b0e1a 0%, #1a1f35 50%, #0d1225 100%);
            color: white;
            padding: 20px;
            position: relative;
        }
        .back-btn {
            display: inline-block;
            color: rgba(255, 255, 255, 0.5);
            text-decoration: none;
            font-size: 15px;
            padding: 8px 20px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 40px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(8px);
            transition: 0.25s;
            margin-bottom: 20px;
        }
        .back-btn:active {
            transform: scale(0.94);
            background: rgba(255, 255, 255, 0.08);
        }
        .header {
            text-align: center;
            margin-bottom: 25px;
        }
        .header h1 {
            font-size: 34px;
            font-weight: 800;
            background: linear-gradient(135deg, #b388ff, #7c4dff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 1px;
        }
        .header .sub {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.35);
            letter-spacing: 2px;
            margin-top: 4px;
        }

        .stats-bar {
            display: flex;
            justify-content: space-around;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border-radius: 20px;
            padding: 16px;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.04);
        }
        .stats-bar .item {
            text-align: center;
        }
        .stats-bar .item .num {
            font-size: 28px;
            font-weight: 700;
            color: #f0e0b0;
        }
        .stats-bar .item .lbl {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: rgba(255, 255, 255, 0.25);
            margin-top: 2px;
        }

        /* ===== ПОЛЕ ВВОДА АДРЕСА ===== */
        .address-input {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .address-input input {
            flex: 1;
            padding: 14px 18px;
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(8px);
            color: #f0e8d0;
            font-size: 14px;
            min-width: 200px;
            transition: 0.3s;
        }
        .address-input input:focus {
            outline: none;
            border-color: rgba(247, 212, 74, 0.3);
            background: rgba(255, 255, 255, 0.07);
        }
        .address-input input::placeholder {
            color: rgba(255, 255, 255, 0.2);
        }
        .address-input button {
            padding: 14px 28px;
            border: none;
            border-radius: 40px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            background: linear-gradient(145deg, #b388ff, #7c4dff);
            color: #fff;
            box-shadow: 0 6px 30px rgba(123, 77, 255, 0.3);
            white-space: nowrap;
        }
        .address-input button:active {
            transform: scale(0.94);
        }
        .address-input button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none;
        }

        /* ===== СПИСОК NFT ===== */
        .nft-grid {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .nft-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border-radius: 18px;
            padding: 16px 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            align-items: center;
            gap: 16px;
            transition: 0.2s;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
        }
        .nft-card:active {
            transform: scale(0.97);
        }
        .nft-card .preview {
            width: 60px;
            height: 60px;
            border-radius: 12px;
            overflow: hidden;
            flex-shrink: 0;
            background: rgba(255, 255, 255, 0.05);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
        }
        .nft-card .preview img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .nft-card .info {
            flex: 1;
            text-align: left;
            min-width: 0;
        }
        .nft-card .info .name {
            font-size: 17px;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .nft-card .info .collection {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.35);
            margin-top: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .nft-card .info .rarity {
            display: inline-block;
            padding: 2px 12px;
            border-radius: 40px;
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-top: 4px;
        }
        .rarity-common {
            background: rgba(176, 176, 176, 0.15);
            color: #b0b0b0;
        }
        .rarity-rare {
            background: rgba(76, 175, 80, 0.15);
            color: #4CAF50;
        }
        .rarity-epic {
            background: rgba(33, 150, 243, 0.15);
            color: #2196F3;
        }
        .rarity-legendary {
            background: rgba(156, 39, 176, 0.15);
            color: #9C27B0;
        }
        .rarity-mythic {
            background: rgba(255, 87, 34, 0.15);
            color: #FF5722;
        }

        .nft-card .price {
            font-size: 13px;
            font-weight: 600;
            color: #f7d44a;
            flex-shrink: 0;
        }

        .empty-state {
            text-align: center;
            padding: 50px 20px;
            color: rgba(255, 255, 255, 0.3);
        }
        .empty-state .emoji {
            font-size: 64px;
            margin-bottom: 16px;
        }
        .empty-state .text {
            font-size: 18px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.5);
        }
        .empty-state .sub {
            font-size: 14px;
            margin-top: 6px;
        }

        .loading {
            text-align: center;
            padding: 30px;
            color: rgba(255, 255, 255, 0.3);
        }
        .loading .spinner {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255, 255, 255, 0.05);
            border-top: 3px solid #b388ff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 12px;
        }
        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }

        .footer {
            margin-top: 30px;
            text-align: center;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.08);
            letter-spacing: 2px;
        }

        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(12, 14, 28, 0.92);
            backdrop-filter: blur(16px);
            color: #f0eee0;
            padding: 14px 28px;
            border-radius: 60px;
            display: none;
            z-index: 999;
            max-width: 90%;
            border: 1px solid rgba(255, 255, 255, 0.05);
            font-size: 15px;
            font-weight: 500;
            box-shadow: 0 16px 50px rgba(0, 0, 0, 0.5);
        }
        .toast.show {
            display: block;
            animation: slideDown 0.35s ease-out;
        }
        @keyframes slideDown {
            from {
                top: -60px;
                opacity: 0;
            }
            to {
                top: 20px;
                opacity: 1;
            }
        }

        @media (max-width: 450px) {
            .address-input input {
                font-size: 13px;
                padding: 12px 14px;
                min-width: 140px;
            }
            .address-input button {
                font-size: 14px;
                padding: 12px 20px;
            }
            .nft-card .preview {
                width: 48px;
                height: 48px;
                font-size: 24px;
            }
            .nft-card .info .name {
                font-size: 15px;
            }
            .header h1 {
                font-size: 28px;
            }
        }
    </style>
</head>
<body>

    <a href="index.html" class="back-btn">← Назад</a>

    <div class="header">
        <h1>💎 Реальные NFT</h1>
        <div class="sub">Подключи TON кошелёк и смотри свои NFT</div>
    </div>

    <div class="stats-bar">
        <div class="item">
            <div class="num" id="totalNFT">0</div>
            <div class="lbl">Всего NFT</div>
        </div>
        <div class="item">
            <div class="num" id="collectionsCount">0</div>
            <div class="lbl">Коллекций</div>
        </div>
    </div>

    <!-- ===== ВВОД АДРЕСА ===== -->
    <div class="address-input">
        <input type="text" id="walletInput" placeholder="Введите TON адрес кошелька" value="EQDvXJ5KqPm...">
        <button onclick="loadNFTs()" id="loadBtn">🔍 Показать NFT</button>
    </div>

    <!-- ===== СПИСОК NFT ===== -->
    <div class="nft-grid" id="nftGrid">
        <div class="empty-state">
            <div class="emoji">🔗</div>
            <div class="text">Введите адрес TON кошелька</div>
            <div class="sub">Например: EQDvXJ5KqPm...</div>
        </div>
    </div>

    <div class="footer">Данные из TON Blockchain • Бесплатно</div>

    <div class="toast" id="toast"></div>

    <script>
        // ============================
        // 1. УТИЛИТЫ
        // ============================
        function showToast(msg, isWin = true) {
            const t = document.getElementById('toast');
            t.innerHTML = msg;
            t.style.borderColor = isWin ? 'rgba(46,204,113,0.15)' : 'rgba(231,76,60,0.15)';
            t.classList.add('show');
            clearTimeout(t._timeout);
            t._timeout = setTimeout(() => {
                t.innerHTML = '';
                t.classList.remove('show');
            }, 3500);
        }

        function getRarityClass(rarity) {
            const r = String(rarity).toLowerCase();
            if (r.includes('mythic') || r.includes('мифический')) return 'rarity-mythic';
            if (r.includes('legendary') || r.includes('легендарный')) return 'rarity-legendary';
            if (r.includes('epic') || r.includes('эпический')) return 'rarity-epic';
            if (r.includes('rare') || r.includes('редкий')) return 'rarity-rare';
            return 'rarity-common';
        }

        // ============================
        // 2. ЗАГРУЗКА NFT ИЗ TON API
        // ============================
        async function loadNFTs() {
            const input = document.getElementById('walletInput');
            const address = input.value.trim();
            const grid = document.getElementById('nftGrid');
            const loadBtn = document.getElementById('loadBtn');

            if (!address || address.length < 10) {
                showToast('❌ Введите корректный TON адрес', false);
                return;
            }

            loadBtn.disabled = true;
            loadBtn.textContent = '⏳ Загрузка...';

            grid.innerHTML = `
                <div class="loading">
                    <div class="spinner"></div>
                    <div>Загрузка NFT из TON...</div>
                </div>
            `;

            try {
                // Используем TON API (бесплатно, без ключа)
                const response = await fetch(`https://tonapi.io/v2/accounts/${address}/nfts?limit=100`, {
                    headers: {
                        'Accept': 'application/json'
                    }
                });

                if (!response.ok) {
                    throw new Error(`Ошибка ${response.status}: ${response.statusText}`);
                }

                const data = await response.json();

                if (!data.nft_items || data.nft_items.length === 0) {
                    grid.innerHTML = `
                        <div class="empty-state">
                            <div class="emoji">📭</div>
                            <div class="text">NFT не найдены</div>
                            <div class="sub">На этом адресе нет NFT или они скрыты</div>
                        </div>
                    `;
                    document.getElementById('totalNFT').textContent = 0;
                    document.getElementById('collectionsCount').textContent = 0;
                    loadBtn.disabled = false;
                    loadBtn.textContent = '🔍 Показать NFT';
                    return;
                }

                // Собираем уникальные коллекции
                const collections = new Set();
                data.nft_items.forEach(item => {
                    if (item.collection && item.collection.name) {
                        collections.add(item.collection.name);
                    }
                });

                document.getElementById('totalNFT').textContent = data.nft_items.length;
                document.getElementById('collectionsCount').textContent = collections.size;

                // Рендерим NFT
                let html = '';
                data.nft_items.forEach(nft => {
                    const name = nft.metadata?.name || nft.name || 'Без названия';
                    const description = nft.metadata?.description || '';
                    const image = nft.metadata?.image || nft.metadata?.thumbnail || '';
                    const rarity = nft.metadata?.attributes?.find(a => a.trait_type === 'Rarity')?.value || 'common';
                    const collectionName = nft.collection?.name || 'Без коллекции';

                    // Определяем эмодзи для превью
                    let emoji = '🖼️';
                    if (rarity.toLowerCase().includes('mythic')) emoji = '⚡';
                    else if (rarity.toLowerCase().includes('legendary')) emoji = '🌟';
                    else if (rarity.toLowerCase().includes('epic')) emoji = '💫';
                    else if (rarity.toLowerCase().includes('rare')) emoji = '✨';

                    html += `
                        <div class="nft-card">
                            <div class="preview">
                                ${image ? `<img src="${image}" alt="${name}" loading="lazy" onerror="this.style.display='none';this.parentElement.textContent='${emoji}'">` : emoji}
                            </div>
                            <div class="info">
                                <div class="name">${name}</div>
                                <div class="collection">${collectionName}</div>
                                <div class="rarity ${getRarityClass(rarity)}">${rarity}</div>
                            </div>
                            <div class="price">${nft.sale?.price ? nft.sale.price + ' TON' : ''}</div>
                        </div>
                    `;
                });

                grid.innerHTML = html;
                showToast('✅ Загружено ' + data.nft_items.length + ' NFT', true);

            } catch (error) {
                console.error('Ошибка:', error);
                grid.innerHTML = `
                    <div class="empty-state">
                        <div class="emoji">⚠️</div>
                        <div class="text">Ошибка загрузки</div>
                        <div class="sub">${error.message}</div>
                    </div>
                `;
                showToast('❌ Ошибка: ' + error.message, false);
            }

            loadBtn.disabled = false;
            loadBtn.textContent = '🔍 Показать NFT';
        }

        // ============================
        // 3. ПРИМЕР АДРЕСА ПРИ ЗАГРУЗКЕ
        // ============================
        // Вставь свой TON адрес для теста
        // Например: EQDvXJ5KqPm... (замени на реальный)
        // Если нет кошелька — можно оставить поле пустым

        // Автозагрузка примера (замени на свой адрес)
        // loadNFTs();

        console.log('💎 Хранилище реальных NFT из TON');
        console.log('Введите адрес кошелька и нажмите "Показать NFT"');
    </script>
</body>
</html>
