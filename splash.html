<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VIP Casino</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #0a0a1a;
            color: white;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }
        .bg {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0;
            background: radial-gradient(ellipse at 30% 20%, rgba(120,80,255,0.10) 0%, transparent 50%),
                        radial-gradient(ellipse at 70% 80%, rgba(255,50,50,0.06) 0%, transparent 50%);
        }
        .particles {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
        }
        .particle {
            position: absolute;
            width: 3px; height: 3px;
            background: rgba(247,212,74,0.2);
            border-radius: 50%;
            animation: floatUp linear infinite;
        }
        .particle:nth-child(1) { left: 10%; animation-duration: 8s; }
        .particle:nth-child(2) { left: 20%; animation-duration: 10s; animation-delay: 1s; }
        .particle:nth-child(3) { left: 30%; animation-duration: 7s; animation-delay: 2s; }
        .particle:nth-child(4) { left: 40%; animation-duration: 12s; animation-delay: 0.5s; }
        .particle:nth-child(5) { left: 50%; animation-duration: 9s; animation-delay: 3s; }
        .particle:nth-child(6) { left: 60%; animation-duration: 11s; animation-delay: 1.5s; }
        .particle:nth-child(7) { left: 70%; animation-duration: 8s; animation-delay: 4s; }
        .particle:nth-child(8) { left: 80%; animation-duration: 13s; animation-delay: 2.5s; }
        .particle:nth-child(9) { left: 90%; animation-duration: 9s; animation-delay: 0.8s; }
        .particle:nth-child(10) { left: 45%; animation-duration: 14s; animation-delay: 3.5s; }
        @keyframes floatUp {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-10vh) scale(1); opacity: 0; }
        }
        .splash {
            position: relative;
            z-index: 1;
            text-align: center;
            max-width: 400px;
            width: 100%;
            padding: 20px;
            animation: fadeIn 1s ease-out;
        }
        @keyframes fadeIn {
            0% { opacity: 0; transform: scale(0.9); }
            100% { opacity: 1; transform: scale(1); }
        }
        .logo {
            font-size: 100px;
            display: inline-block;
            animation: logoPulse 2s ease-in-out infinite;
            filter: drop-shadow(0 0 60px rgba(247,212,74,0.15));
        }
        @keyframes logoPulse {
            0%, 100% { transform: scale(1); filter: drop-shadow(0 0 40px rgba(247,212,74,0.1)); }
            50% { transform: scale(1.05); filter: drop-shadow(0 0 80px rgba(247,212,74,0.2)); }
        }
        .title {
            font-size: 34px;
            font-weight: 800;
            margin-top: 4px;
            background: linear-gradient(135deg, #f7d44a 0%, #ff6b6b 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 3px;
        }
        .subtitle {
            font-size: 13px;
            color: rgba(255,255,255,0.2);
            letter-spacing: 6px;
            text-transform: uppercase;
            margin-top: 4px;
            margin-bottom: 30px;
        }
        .progress-wrapper {
            width: 100%;
            max-width: 280px;
            margin: 0 auto 20px;
        }
        .progress-bar {
            width: 100%;
            height: 4px;
            background: rgba(255,255,255,0.04);
            border-radius: 4px;
            overflow: hidden;
            position: relative;
        }
        .progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #f7d44a, #ff6b6b);
            border-radius: 4px;
            transition: width 0.3s ease;
            box-shadow: 0 0 20px rgba(247,212,74,0.15);
        }
        .progress-text {
            font-size: 12px;
            color: rgba(255,255,255,0.15);
            margin-top: 8px;
            letter-spacing: 2px;
        }
        .loading-text {
            font-size: 13px;
            color: rgba(255,255,255,0.15);
            letter-spacing: 4px;
            text-transform: uppercase;
            animation: blink 1.2s ease-in-out infinite;
        }
        @keyframes blink {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }
        .version {
            position: fixed;
            bottom: 20px;
            font-size: 10px;
            color: rgba(255,255,255,0.04);
            letter-spacing: 4px;
            z-index: 1;
        }
        .fade-out {
            animation: fadeOut 0.8s ease-in forwards;
        }
        @keyframes fadeOut {
            0% { opacity: 1; transform: scale(1); }
            100% { opacity: 0; transform: scale(1.05); }
        }
    </style>
</head>
<body>
    <div class="bg"></div>
    <div class="particles">
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
    </div>
    <div class="splash" id="splashScreen">
        <div class="logo">🎰</div>
        <div class="title">VIP CASINO</div>
        <div class="subtitle">✦ Играй и выигрывай ✦</div>
        <div class="progress-wrapper">
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div class="progress-text" id="progressText">0%</div>
        </div>
        <div class="loading-text" id="loadingText">Загрузка...</div>
    </div>
    <div class="version">v 2.0</div>
    <script>
        const splash = document.getElementById('splashScreen');
        const progressFill = document.getElementById('progressFill');
        const progressText = document.getElementById('progressText');
        const loadingText = document.getElementById('loadingText');
        let progress = 0;
        const steps = ['Загружаем игры...', 'Подключаем кейсы...', 'Настраиваем профиль...', 'Почти готово...', 'Добро пожаловать! 🎉'];
        function updateProgress() {
            progress += Math.random() * 5 + 2;
            if (progress > 100) progress = 100;
            progressFill.style.width = progress + '%';
            progressText.textContent = Math.floor(progress) + '%';
            const index = Math.min(Math.floor(progress / 20), steps.length - 1);
            loadingText.textContent = steps[index];
            if (progress < 100) {
                setTimeout(updateProgress, 200 + Math.random() * 300);
            } else {
                loadingText.textContent = 'Добро пожаловать! 🎉';
                setTimeout(() => {
                    splash.classList.add('fade-out');
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 800);
                }, 500);
            }
        }
        setTimeout(updateProgress, 500);
        console.log('🎰 VIP Casino загружается...');
    </script>
</body>
</html>
