<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🐰 Rabbits</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #0a0a1a;
            color: white;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
            user-select: none;
        }

        .bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            background:
                radial-gradient(ellipse at 20% 30%, rgba(180, 80, 255, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 70%, rgba(255, 50, 50, 0.05) 0%, transparent 50%);
        }

        .app-wrapper {
            position: relative;
            z-index: 1;
            max-width: 480px;
            width: 100%;
            height: 100vh;
            margin: 0 auto;
            overflow: hidden;
        }

        .page {
            height: 100vh;
            padding: 12px 16px 80px;
            overflow-y: auto;
            overflow-x: hidden;
        }

        /* ===== ХЕДЕР ===== */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
            flex-shrink: 0;
        }
        .header .logo {
            font-size: 20px;
            font-weight: 800;
            color: #f7d44a;
            letter-spacing: 0.5px;
        }
        .header .coins {
            display: flex;
            align-items: center;
            gap: 6px;
            background: rgba(255, 255, 255, 0.03);
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 14px;
            font-weight: 700;
            color: #f7d44a;
            border: 1px solid rgba(255, 255, 255, 0.04);
        }

        /* ===== БАЛАНС ===== */
        .balance-block {
            text-align: center;
            padding: 12px 0 8px;
            flex-shrink: 0;
        }
        .balance-block .amount {
            font-size: 38px;
            font-weight: 800;
            color: #f7d44a;
            text-shadow: 0 0 40px rgba(247, 212, 74, 0.1);
            letter-spacing: 1px;
        }
        .balance-block .label {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.15);
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-top: 2px;
        }

        /* ===== LIVE ===== */
        .live-badge {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin: 6px 0 10px;
            padding: 6px 16px;
            background: rgba(231, 76, 60, 0.08);
            border-radius: 40px;
            border: 1px solid rgba(231, 76, 60, 0.1);
            font-size: 13px;
            font-weight: 600;
            color: #e74c3c;
            letter-spacing: 2px;
        }
        .live-badge .dot {
            width: 8px;
            height: 8px;
            background: #e74c3c;
            border-radius: 50%;
            animation: livePulse 1.2s ease-in-out infinite;
        }
        @keyframes livePulse {
            0%,
            100% {
                opacity: 1;
                transform: scale(1);
            }
            50% {
                opacity: 0.3;
                transform: scale(0.6);
            }
        }
        .live-badge .num {
            font-size: 16px;
            font-weight: 700;
            color: #f7d44a;
        }

        /* ===== КЕЙСЫ ===== */
        .cases-row {
            display: flex;
            gap: 10px;
            margin: 8px 0 8px;
        }
        .case-card {
            flex: 1;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 14px;
            padding: 16px 10px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.03);
            transition: 0.3s;
            cursor: pointer;
            position: relative;
        }
        .case-card:active {
            transform: scale(0.94);
            background: rgba(255, 255, 255, 0.04);
        }
        .case-card .icon {
            font-size: 28px;
            display: block;
            margin-bottom: 4px;
        }
        .case-card .title {
            font-size: 13px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.7);
        }
        .case-card .badge {
            font-size: 10px;
            color: rgba(255, 255, 255, 0.2);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .case-card .badge.free {
            color: #2ecc71;
        }
        .case-card .badge.hot {
            color: #f7d44a;
        }

        .case-card .deposit-tag {
            display: inline-block;
            margin-top: 4px;
            padding: 2px 10px;
            background: rgba(247, 212, 74, 0.08);
            border-radius: 40px;
            font-size: 9px;
            color: #f7d44a;
            letter-spacing: 1px;
            border: 1px solid rgba(247, 212, 74, 0.05);
        }

        /* ===== СТРОКА С ПОДАРКАМИ ===== */
        .case-reward {
            display: none;
            text-align: center;
            padding: 10px;
            margin: 6px 0 10px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 14px;
            border: 1px solid rgba(255, 255, 255, 0.04);
            animation: rewardSlide 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .case-reward.show {
            display: block;
        }
        .case-reward .emoji {
            font-size: 32px;
            display: block;
        }
        .case-reward .text {
            font-size: 16px;
            font-weight: 600;
            color: #f7d44a;
            margin-top: 4px;
        }
        .case-reward .sub {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.2);
        }

        @keyframes rewardSlide {
            0% {
                opacity: 0;
                transform: translateY(-20px) scale(0.8);
            }
            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        /* ===== КНОПКА ИГРАТЬ ===== */
        .play-btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 16px;
            background: linear-gradient(145deg, #f7d44a, #dbb84a);
            color: #1a1a2e;
            font-size: 18px;
            font-weight: 800;
            letter-spacing: 3px;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 6px 30px rgba(247, 212, 74, 0.1);
            margin: 6px 0 10px;
        }
        .play-btn:active {
            transform: scale(0.96);
            box-shadow: 0 6px 40px rgba(247, 212, 74, 0.15);
        }
        .play-btn .arrow {
            display: inline-block;
            transition: 0.3s;
        }
        .play-btn:active .arrow {
            transform: translateX(6px);
        }

        /* ===== НИЖНЯЯ НАВИГАЦИЯ ===== */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(10, 10, 26, 0.92);
            backdrop-filter: blur(16px);
            border-top: 1px solid rgba(255, 255, 255, 0.03);
            display: flex;
            justify-content: space-around;
            padding: 8px 0 12px;
            max-width: 480px;
            margin: 0 auto;
            z-index: 100;
        }
        .bottom-nav .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            text-decoration: none;
            color: rgba(255, 255, 255, 0.15);
            font-size: 9px;
            font-weight: 500;
            letter-spacing: 0.5px;
            transition: 0.3s;
            background: none;
            border: none;
            cursor: pointer;
            padding: 4px 16px;
        }
        .bottom-nav .nav-item .icon {
            font-size: 22px;
            transition: 0.3s;
        }
        .bottom-nav .nav-item.active {
            color: #f7d44a;
        }
        .bottom-nav .nav-item.active .icon {
            transform: translateY(-2px);
        }
        .bottom-nav .nav-item:active {
            transform: scale(0.9);
        }

        /* ===== ПРОФИЛЬ ===== */
        .profile-header {
            text-align: center;
            padding: 8px 0 12px;
        }
        .profile-header .avatar {
            font-size: 52px;
        }
        .profile-header .name {
            font-size: 20px;
            font-weight: 700;
            margin-top: 2px;
        }
        .profile-header .id {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.15);
        }

        .profile-stats {
            display: flex;
            gap: 8px;
            margin: 8px 0 12px;
        }
        .profile-stats .stat {
            flex: 1;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 12px;
            padding: 10px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.03);
        }
        .profile-stats .stat .num {
            font-size: 20px;
            font-weight: 700;
            color: #f7d44a;
        }
        .profile-stats .stat .lbl {
            font-size: 8px;
            color: rgba(255, 255, 255, 0.15);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 2px;
        }

        .deposit-section {
            display: flex;
            gap: 8px;
            margin: 10px 0 12px;
            flex-wrap: wrap;
        }
        .deposit-btn {
            flex: 1;
            padding: 12px 10px;
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: 14px;
            background: rgba(255, 255, 255, 0.02);
            color: rgba(255, 255, 255, 0.5);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            text-align: center;
            transition: 0.3s;
            min-width: 60px;
        }
        .deposit-btn:active {
            transform: scale(0.94);
            background: rgba(255, 255, 255, 0.04);
        }
        .deposit-btn .icon {
            font-size: 18px;
            display: block;
            margin-bottom: 2px;
        }

        @media (max-width: 400px) {
            .balance-block .amount {
                font-size: 30px;
            }
            .bottom-nav .nav-item {
                padding: 4px 10px;
                font-size: 8px;
            }
            .bottom-nav .nav-item .icon {
                font-size: 18px;
            }
            .case-card {
                padding: 12px 6px;
            }
            .case-card .icon {
                font-size: 22px;
            }
            .play-btn {
                font-size: 16px;
                padding: 14px;
            }
        }
    </style>
</head>
<body>

    <div class="bg"></div>

    <div class="app-wrapper">

        <!-- ===== ГЛАВНАЯ ===== -->
        <div class="page" id="pageHome">
            <div class="header">
                <div class="logo">🐰 Rabbits</div>
                <div class="coins">
                    <span>⭐</span>
                    <span id="headerStars">0</span>
                </div>
            </div>

            <div class="balance-block">
                <div class="amount" id="balanceDisplay">1000</div>
                <div class="label">💰 Игровой баланс</div>
            </div>

            <!-- ===== LIVE ===== -->
            <div class="live-badge">
                <span class="dot"></span>
                LIVE <span class="num" id="liveCount">0.5</span>
            </div>

            <!-- ===== КЕЙСЫ ===== -->
            <div class="cases-row">
                <div class="case-card" onclick="openCase('free')">
                    <span class="icon">📦</span>
                    <div class="title">Free</div>
                    <div class="badge free">case</div>
                </div>
                <div class="case-card" onclick="openCase('deposit')">
                    <span class="icon">💎</span>
                    <div class="title">Кейс за депозит</div>
                    <span class="deposit-tag">⭐</span>
                </div>
            </div>

            <!-- ===== СТРОКА С ПОДАРКАМИ ===== -->
            <div class="case-reward" id="caseReward">
                <span class="emoji" id="rewardEmoji">🎉</span>
                <div class="text" id="rewardText">+0 монет</div>
                <div class="sub" id="rewardSub">Подарок получен!</div>
            </div>

            <!-- ===== КНОПКА ИГРАТЬ ===== -->
            <button class="play-btn" onclick="window.location.href='games.html'">
                🎮 ИГРАТЬ! <span class="arrow">→</span>
            </button>
        </div>

    </div>

    <!-- ===== НИЖНЯЯ НАВИГАЦИЯ ===== -->
    <div class="bottom-nav" id="bottomNav">
        <button class="nav-item" data-page="pageTop" onclick="showToast('🏆 Топ игроков (в разработке)')">
            <span class="icon">🏆</span>
            Топ
        </button>
        <button class="nav-item active" data-page="pageHome">
            <span class="icon">🏠</span>
            Главная
        </button>
        <button class="nav-item" data-page="pageRabbit" onclick="showToast('🐰 Зайчик (в разработке)')">
            <span class="icon">🐰</span>
            Rabbit
        </button>
        <button class="nav-item" data-page="pageProfile" onclick="window.location.href='nft.html'">
            <span class="icon">👤</span>
            Профиль
        </button>
    </div>

    <script>
        // ============================
        // 1. БАЛАНС
        // ============================
        let balance = parseInt(localStorage.getItem('casinoBalance')) || 1000;

        function updateAllBalances() {
            document.getElementById('balanceDisplay').textContent = balance;
            document.querySelectorAll('[id^="headerStars"]').forEach(el => {
                el.textContent = Math.floor(balance / 10);
            });
            localStorage.setItem('casinoBalance', balance);
        }
        updateAllBalances();

        // ============================
        // 2. LIVE
        // ============================
        function updateLive() {
            const live = (Math.random() * 2 + 0.1).toFixed(1);
            document.getElementById('liveCount').textContent = live;
        }
        setInterval(updateLive, 3000);

        // ============================
        // 3. КЕЙСЫ
        // ============================
        function openCase(type) {
            const rewards = {
                'free': { min: 5, max: 25, emoji: '📦', name: 'Free Case' },
                'deposit': { min: 50, max: 200, emoji: '💎', name: 'Кейс за депозит' }
            };
            const data = rewards[type] || rewards['free'];
            const reward = Math.floor(Math.random() * (data.max - data.min + 1)) + data.min;

            const rewardEl = document.getElementById('caseReward');
            document.getElementById('rewardEmoji').textContent = data.emoji;
            document.getElementById('rewardText').textContent = '+' + reward + ' монет';
            document.getElementById('rewardSub').textContent = data.name + ' открыт!';
            rewardEl.classList.add('show');

            balance += reward;
            updateAllBalances();

            clearTimeout(window.rewardTimeout);
            window.rewardTimeout = setTimeout(() => {
                rewardEl.classList.remove('show');
            }, 3000);

            showToast('🎁 ' + data.emoji + ' ' + data.name + ' +' + reward + ' монет!', true);
        }

        // ============================
        // 4. TOAST
        // ============================
        function showToast(msg, isWin = true) {
            const toast = document.createElement('div');
            toast.style.cssText = `
                    position: fixed; top: 80px; left: 50%; transform: translateX(-50%);
                    background: rgba(12,14,28,0.92); backdrop-filter: blur(16px);
                    color: #f0eee0; padding: 12px 24px; border-radius: 60px; z-index: 9999;
                    max-width: 90%; border: 1px solid ${isWin ? 'rgba(247,212,74,0.1)' : 'rgba(231,76,60,0.1)'};
                    font-size: 15px; font-weight: 500;
                    box-shadow: 0 16px 50px rgba(0,0,0,0.3);
                    animation: fadeIn 0.35s ease-out;
                `;
            toast.textContent = msg;
            document.body.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transition = 'opacity 0.3s';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        // ============================
        // 5. НАВИГАЦИЯ
        // ============================
        const navItems = document.querySelectorAll('.nav-item');

        navItems.forEach(item => {
            item.addEventListener('click', function() {
                navItems.forEach(n => n.classList.remove('active'));
                this.classList.add('active');
            });
        });

        // ============================
        // 6. СТАРТ
        // ============================
        if (balance === 1000) {
            setTimeout(() => showToast('🐰 Добро пожаловать в Rabbits!'), 400);
        }

        console.log('🐰 Rabbits загружен!');
        console.log('💰 Баланс:', balance);
        console.log('🎁 Кейсы готовы!');
    </script>
</body>
</html>
