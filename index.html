<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🎰 VIP Казино</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 15px;
            background: #0a0a1a;
            overflow: hidden;
            position: relative;
        }
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            background:
                radial-gradient(ellipse at 20% 50%, rgba(74, 71, 163, 0.4) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 50%, rgba(231, 76, 60, 0.3) 0%, transparent 60%),
                radial-gradient(ellipse at 50% 100%, rgba(247, 212, 74, 0.15) 0%, transparent 50%);
        }

        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
        }
        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: rgba(247, 212, 74, 0.3);
            border-radius: 50%;
            animation: floatParticle linear infinite;
        }
        .particle:nth-child(1) { left: 10%;
            animation-duration: 12s; }
        .particle:nth-child(2) { left: 25%;
            animation-duration: 15s;
            animation-delay: 2s; }
        .particle:nth-child(3) { left: 40%;
            animation-duration: 10s;
            animation-delay: 4s; }
        .particle:nth-child(4) { left: 55%;
            animation-duration: 14s;
            animation-delay: 1s; }
        .particle:nth-child(5) { left: 70%;
            animation-duration: 11s;
            animation-delay: 3s; }
        .particle:nth-child(6) { left: 85%;
            animation-duration: 16s;
            animation-delay: 5s; }
        .particle:nth-child(7) { left: 50%;
            animation-duration: 13s;
            animation-delay: 2.5s; }
        .particle:nth-child(8) { left: 15%;
            animation-duration: 18s;
            animation-delay: 1.5s; }

        @keyframes floatParticle {
            0% { transform: translateY(100vh) scale(0);
                opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-10vh) scale(1);
                opacity: 0; }
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 400px;
            width: 100%;
            text-align: center;
        }

        .logo {
            font-size: 56px;
            display: inline-block;
            animation: logoFloat 3s ease-in-out infinite;
            filter: drop-shadow(0 0 30px rgba(247, 212, 74, 0.15));
        }
        @keyframes logoFloat {
            0%,
            100% { transform: translateY(0px) scale(1); }
            50% { transform: translateY(-6px) scale(1.04); }
        }
        .title {
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 2px;
            background: linear-gradient(135deg, #f7d44a 0%, #ff6b6b 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 2px;
        }
        .subtitle {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.3);
            margin-bottom: 14px;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        .balance-card {
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(16px);
            border-radius: 18px;
            padding: 12px 16px;
            margin-bottom: 14px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
        }
        .balance-card .label {
            font-size: 9px;
            color: rgba(255, 255, 255, 0.3);
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .balance-card .amount {
            font-size: 40px;
            font-weight: 800;
            color: #f7d44a;
            text-shadow: 0 0 30px rgba(247, 212, 74, 0.1);
            letter-spacing: 2px;
            line-height: 1.1;
        }

        /* ===== ГРУППЫ ===== */
        .section-label {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: rgba(255, 255, 255, 0.15);
            margin: 10px 0 8px;
            text-align: left;
            padding-left: 4px;
        }

        .menu-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 4px;
        }
        .menu-row {
            display: flex;
            gap: 8px;
        }

        .menu-item {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border-radius: 14px;
            padding: 14px 12px;
            border: 1px solid rgba(255, 255, 255, 0.04);
            text-decoration: none;
            color: white;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: transform 0.15s;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.15);
            flex: 1;
        }
        .menu-item:active {
            transform: scale(0.94);
        }
        .menu-item .icon {
            font-size: 26px;
            width: 40px;
            text-align: center;
            flex-shrink: 0;
        }
        .menu-item .info {
            flex: 1;
            text-align: left;
        }
        .menu-item .info .name {
            font-size: 14px;
            font-weight: 600;
            line-height: 1.2;
        }
        .menu-item .info .desc {
            font-size: 10px;
            color: rgba(255, 255, 255, 0.25);
        }
        .menu-item .badge {
            background: linear-gradient(135deg, #b388ff, #7c4dff);
            padding: 2px 10px;
            border-radius: 40px;
            font-size: 11px;
            font-weight: 700;
            color: white;
            flex-shrink: 0;
        }
        .menu-item .arrow {
            font-size: 16px;
            color: rgba(255, 255, 255, 0.15);
            flex-shrink: 0;
        }

        /* Цвета групп */
        .menu-item.coin .icon {
            background: rgba(247, 212, 74, 0.1);
            border-radius: 10px;
            padding: 4px;
        }
        .menu-item.roulette .icon {
            background: rgba(231, 76, 60, 0.1);
            border-radius: 10px;
            padding: 4px;
        }
        .menu-item.blackjack .icon {
            background: rgba(46, 204, 113, 0.1);
            border-radius: 10px;
            padding: 4px;
        }
        .menu-item.nft .icon {
            background: rgba(123, 77, 255, 0.1);
            border-radius: 10px;
            padding: 4px;
        }

        .stats {
            display: flex;
            justify-content: center;
            gap: 16px;
            margin-top: 12px;
            padding: 10px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 14px;
            border: 1px solid rgba(255, 255, 255, 0.03);
        }
        .stats-item {
            text-align: center;
        }
        .stats-item .number {
            font-size: 15px;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.5);
        }
        .stats-item .label {
            font-size: 8px;
            color: rgba(255, 255, 255, 0.15);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .footer {
            margin-top: 12px;
            font-size: 9px;
            color: rgba(255, 255, 255, 0.06);
            letter-spacing: 2px;
        }

        @media (max-width: 400px) {
            .container {
                max-width: 340px;
            }
            .title {
                font-size: 22px;
            }
            .logo {
                font-size: 44px;
            }
            .balance-card .amount {
                font-size: 32px;
            }
            .menu-item {
                padding: 10px 10px;
            }
            .menu-item .icon {
                font-size: 20px;
                width: 32px;
            }
            .menu-item .info .name {
                font-size: 12px;
            }
            .menu-item .info .desc {
                font-size: 9px;
            }
            .stats {
                gap: 10px;
                padding: 8px;
            }
            .stats-item .number {
                font-size: 13px;
            }
        }
    </style>
</head>
<body>

    <div class="bg-animation"></div>
    <div class="particles">
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
    </div>

    <div class="container">
        <div class="logo">🎰</div>
        <div class="title">VIP CASINO</div>
        <div class="subtitle">✦ Играй и выигрывай ✦</div>

        <div class="balance-card">
            <div class="label">💰 Твой баланс</div>
            <div class="amount" id="balanceDisplay">1000</div>
        </div>

        <!-- ===== ИГРЫ ===== -->
        <div class="section-label">🎮 Игры</div>
        <div class="menu-group">
            <div class="menu-row">
                <a href="coin.html" class="menu-item coin">
                    <div class="icon">🪙</div>
                    <div class="info">
                        <div class="name">Монетка</div>
                        <div class="desc">Орёл или решка</div>
                    </div>
                    <div class="arrow">›</div>
                </a>
                <a href="roulette.html" class="menu-item roulette">
                    <div class="icon">🎡</div>
                    <div class="info">
                        <div class="name">Рулетка</div>
                        <div class="desc">Красное / Чёрное</div>
                    </div>
                    <div class="arrow">›</div>
                </a>
            </div>
            <div class="menu-row">
                <a href="blackjack.html" class="menu-item blackjack">
                    <div class="icon">🃏</div>
                    <div class="info">
                        <div class="name">Блэкджек</div>
                        <div class="desc">21 против дилера</div>
                    </div>
                    <div class="arrow">›</div>
                </a>
            </div>
        </div>

        <!-- ===== ХРАНИЛИЩЕ ===== -->
        <div class="section-label">💎 Хранилище</div>
        <div class="menu-group">
            <div class="menu-row">
                <a href="nft.html" class="menu-item nft">
                    <div class="icon">💎</div>
                    <div class="info">
                        <div class="name">Мои NFT</div>
                        <div class="desc">Коллекционные карточки</div>
                    </div>
                    <div class="badge" id="nftBadge">0</div>
                    <div class="arrow">›</div>
                </a>
            </div>
        </div>

        <div class="stats">
            <div class="stats-item">
                <div class="number" id="gamesPlayed">0</div>
                <div class="label">Игр сыграно</div>
            </div>
            <div class="stats-item">
                <div class="number" id="totalWins">0</div>
                <div class="label">Побед</div>
            </div>
            <div class="stats-item">
                <div class="number" id="bestWin">0</div>
                <div class="label">Лучший выигрыш</div>
            </div>
        </div>

        <div class="footer">Сделано с ❤️ в Telegram Mini App</div>
    </div>

    <script>
        // ===== БАЛАНС =====
        let balance = parseInt(localStorage.getItem('casinoBalance')) || 1000;
        document.getElementById('balanceDisplay').textContent = balance;

        window.addEventListener('focus', () => {
            balance = parseInt(localStorage.getItem('casinoBalance')) || 1000;
            document.getElementById('balanceDisplay').textContent = balance;
            updateNFTBadge();
        });

        // ===== СТАТИСТИКА =====
        const games = parseInt(localStorage.getItem('totalGames')) || 0;
        const wins = parseInt(localStorage.getItem('totalWins')) || 0;
        const best = parseInt(localStorage.getItem('bestWin')) || 0;
        document.getElementById('gamesPlayed').textContent = games;
        document.getElementById('totalWins').textContent = wins;
        document.getElementById('bestWin').textContent = best;

        // ===== NFT БЕЙДЖ =====
        function updateNFTBadge() {
            try {
                const nfts = JSON.parse(localStorage.getItem('userNFTs')) || [];
                document.getElementById('nftBadge').textContent = nfts.length;
            } catch {
                document.getElementById('nftBadge').textContent = 0;
            }
        }
        updateNFTBadge();
    </script>
</body>
</html>
