<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🐰 Rabbits</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #0a0a1a;
            color: white;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
            user-select: none;
        }

        .bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            background:
                radial-gradient(ellipse at 20% 30%, rgba(120, 80, 255, 0.06) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 70%, rgba(255, 50, 50, 0.04) 0%, transparent 50%);
        }

        .app-wrapper {
            position: relative;
            z-index: 1;
            max-width: 480px;
            width: 100%;
            height: 100vh;
            margin: 0 auto;
            overflow: hidden;
        }

        .page {
            height: 100vh;
            padding: 12px 16px 80px;
            overflow-y: auto;
            overflow-x: hidden;
        }

        /* ===== ХЕДЕР ===== */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
            flex-shrink: 0;
        }
        .header .logo {
            font-size: 20px;
            font-weight: 800;
            color: #f7d44a;
            letter-spacing: 0.5px;
        }
        .header .coins {
            display: flex;
            align-items: center;
            gap: 6px;
            background: rgba(255, 255, 255, 0.03);
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 14px;
            font-weight: 700;
            color: #f7d44a;
            border: 1px solid rgba(255, 255, 255, 0.04);
        }

        /* ===== БАЛАНС ===== */
        .balance-block {
            text-align: center;
            padding: 12px 0 8px;
            flex-shrink: 0;
        }
        .balance-block .amount {
            font-size: 38px;
            font-weight: 800;
            color: #f7d44a;
            text-shadow: 0 0 40px rgba(247, 212, 74, 0.1);
            letter-spacing: 1px;
        }
        .balance-block .label {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.15);
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-top: 2px;
        }

        /* ===== КЕЙСЫ С АНИМАЦИЕЙ ===== */
        .cases-row {
            display: flex;
            gap: 10px;
            margin: 12px 0 8px;
            flex-wrap: wrap;
        }
        .case-card {
            flex: 1;
            min-width: 80px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 14px;
            padding: 14px 10px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.03);
            transition: 0.3s;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }
        .case-card:active {
            transform: scale(0.94);
            background: rgba(255, 255, 255, 0.04);
        }
        .case-card .icon {
            font-size: 28px;
            display: block;
            margin-bottom: 4px;
        }
        .case-card .title {
            font-size: 12px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.7);
        }
        .case-card .badge {
            font-size: 10px;
            color: rgba(255, 255, 255, 0.2);
        }
        .case-card .badge.free {
            color: #2ecc71;
        }
        .case-card .badge.hot {
            color: #f7d44a;
        }

        /* Анимация открытия кейса */
        .case-reward {
            display: none;
            text-align: center;
            padding: 10px;
            margin: 6px 0 10px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 14px;
            border: 1px solid rgba(255, 255, 255, 0.04);
            animation: rewardSlide 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .case-reward.show {
            display: block;
        }
        .case-reward .emoji {
            font-size: 32px;
            display: block;
        }
        .case-reward .text {
            font-size: 16px;
            font-weight: 600;
            color: #f7d44a;
            margin-top: 4px;
        }
        .case-reward .sub {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.2);
        }

        @keyframes rewardSlide {
            0% {
                opacity: 0;
                transform: translateY(-20px) scale(0.8);
            }
            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        /* ===== КНОПКА ИГРАТЬ ===== */
        .play-btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 16px;
            background: linear-gradient(145deg, #f7d44a, #dbb84a);
            color: #1a1a2e;
            font-size: 18px;
            font-weight: 800;
            letter-spacing: 2px;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 6px 30px rgba(247, 212, 74, 0.1);
            margin: 6px 0 10px;
        }
        .play-btn:active {
            transform: scale(0.96);
            box-shadow: 0 6px 40px rgba(247, 212, 74, 0.15);
        }
        .play-btn .arrow {
            display: inline-block;
            transition: 0.3s;
        }
        .play-btn:active .arrow {
            transform: translateX(6px);
        }

        /* ===== ПРОФИЛЬ ===== */
        .profile-header {
            text-align: center;
            padding: 8px 0 12px;
        }
        .profile-header .avatar {
            font-size: 52px;
        }
        .profile-header .name {
            font-size: 20px;
            font-weight: 700;
            margin-top: 2px;
        }
        .profile-header .id {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.15);
        }

        .profile-stats {
            display: flex;
            gap: 8px;
            margin: 8px 0 12px;
        }
        .profile-stats .stat {
            flex: 1;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 12px;
            padding: 10px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.03);
        }
        .profile-stats .stat .num {
            font-size: 20px;
            font-weight: 700;
            color: #f7d44a;
        }
        .profile-stats .stat .lbl {
            font-size: 8px;
            color: rgba(255, 255, 255, 0.15);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 2px;
        }

        /* ===== ПОПОЛНЕНИЕ ===== */
        .deposit-section {
            display: flex;
            gap: 8px;
            margin: 10px 0 12px;
            flex-wrap: wrap;
        }
        .deposit-btn {
            flex: 1;
            padding: 12px 10px;
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: 14px;
            background: rgba(255, 255, 255, 0.02);
            color: rgba(255, 255, 255, 0.5);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            text-align: center;
            transition: 0.3s;
            min-width: 60px;
        }
        .deposit-btn:active {
            transform: scale(0.94);
            background: rgba(255, 255, 255, 0.04);
        }
        .deposit-btn .icon {
            font-size: 18px;
            display: block;
            margin-bottom: 2px;
        }

        /* ===== НИЖНЯЯ НАВИГАЦИЯ ===== */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(10, 10, 26, 0.92);
            backdrop-filter: blur(16px);
            border-top: 1px solid rgba(255, 255, 255, 0.03);
            display: flex;
            justify-content: space-around;
            padding: 8px 0 12px;
            max-width: 480px;
            margin: 0 auto;
            z-index: 100;
        }
        .bottom-nav .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            text-decoration: none;
            color: rgba(255, 255, 255, 0.15);
            font-size: 9px;
            font-weight: 500;
            letter-spacing: 0.5px;
            transition: 0.3s;
            background: none;
            border: none;
            cursor: pointer;
            padding: 4px 16px;
        }
        .bottom-nav .nav-item .icon {
            font-size: 22px;
            transition: 0.3s;
        }
        .bottom-nav .nav-item.active {
            color: #f7d44a;
        }
        .bottom-nav .nav-item.active .icon {
            transform: translateY(-2px);
        }
        .bottom-nav .nav-item:active {
            transform: scale(0.9);
        }

        /* ===== ОВЕРЛЕЙ ПОПОЛНЕНИЯ ===== */
        .deposit-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(20px);
            z-index: 300;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            padding: 20px;
        }
        .deposit-overlay.show {
            display: flex;
            animation: fadeIn 0.3s ease-out;
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(0.95);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .deposit-card {
            max-width: 400px;
            width: 100%;
            background: linear-gradient(145deg, #1a1f35, #0d1225);
            border-radius: 24px;
            padding: 28px 24px;
            border: 1px solid rgba(255, 255, 255, 0.04);
            box-shadow: 0 20px 80px rgba(0, 0, 0, 0.5);
            text-align: center;
        }
        .deposit-card .title {
            font-size: 24px;
            font-weight: 700;
            color: #f7d44a;
            margin-bottom: 4px;
        }
        .deposit-card .sub {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.2);
            margin-bottom: 20px;
        }
        .deposit-card .balance-show {
            font-size: 36px;
            font-weight: 800;
            color: #f7d44a;
            margin-bottom: 16px;
            padding: 12px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.03);
        }

        .deposit-options {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin: 16px 0;
        }
        .deposit-options .option {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 18px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 14px;
            border: 1px solid rgba(255, 255, 255, 0.03);
            cursor: pointer;
            transition: 0.3s;
        }
        .deposit-options .option:active {
            transform: scale(0.96);
            background: rgba(255, 255, 255, 0.04);
        }
        .deposit-options .option .left {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .deposit-options .option .left .icon {
            font-size: 28px;
        }
        .deposit-options .option .left .info .name {
            font-size: 15px;
            font-weight: 600;
        }
        .deposit-options .option .left .info .desc {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.2);
        }
        .deposit-options .option .right {
            font-size: 16px;
            font-weight: 700;
            color: #f7d44a;
        }

        .deposit-close {
            margin-top: 16px;
            padding: 12px;
            border: none;
            border-radius: 40px;
            background: rgba(255, 255, 255, 0.03);
            color: rgba(255, 255, 255, 0.2);
            font-size: 14px;
            cursor: pointer;
            width: 100%;
            border: 1px solid rgba(255, 255, 255, 0.03);
            transition: 0.3s;
        }
        .deposit-close:active {
            transform: scale(0.94);
        }

        @media (max-width: 400px) {
            .balance-block .amount {
                font-size: 30px;
            }
            .bottom-nav .nav-item {
                padding: 4px 10px;
                font-size: 8px;
            }
            .bottom-nav .nav-item .icon {
                font-size: 18px;
            }
            .case-card {
                min-width: 60px;
                padding: 10px 6px;
            }
            .case-card .icon {
                font-size: 22px;
            }
            .play-btn {
                font-size: 16px;
                padding: 14px;
            }
        }
    </style>
</head>
<body>

    <div class="bg"></div>

    <div class="app-wrapper">

        <!-- ===== ГЛАВНАЯ ===== -->
        <div class="page" id="pageHome">
            <div class="header">
                <div class="logo">🐰 Rabbits</div>
                <div class="coins">
                    <span>⭐</span>
                    <span id="headerStars">0</span>
                </div>
            </div>

            <div class="balance-block">
                <div class="amount" id="balanceDisplay">1000</div>
                <div class="label">💰 Игровой баланс</div>
            </div>

            <!-- ===== КЕЙСЫ ===== -->
            <div class="cases-row">
                <div class="case-card" onclick="openCase('free')">
                    <span class="icon">📦</span>
                    <div class="title">Free</div>
                    <div class="badge free">case</div>
                </div>
                <div class="case-card" onclick="openCase('birthday')">
                    <span class="icon">🎂</span>
                    <div class="title">HAPPY B-DAY</div>
                    <div class="badge hot">🔥 2</div>
                </div>
            </div>

            <!-- ===== СТРОКА С ПОДАРКАМИ ===== -->
            <div class="case-reward" id="caseReward">
                <span class="emoji" id="rewardEmoji">🎉</span>
                <div class="text" id="rewardText">+0 монет</div>
                <div class="sub" id="rewardSub">Подарок получен!</div>
            </div>

            <!-- ===== КНОПКА ИГРАТЬ ===== -->
            <button class="play-btn" onclick="window.location.href='games.html'">
                🎮 ИГРАТЬ! <span class="arrow">→</span>
            </button>
        </div>

    </div>

    <!-- ===== НИЖНЯЯ НАВИГАЦИЯ ===== -->
    <div class="bottom-nav" id="bottomNav">
        <button class="nav-item active" data-page="pageHome">
            <span class="icon">🏠</span>
            Главная
        </button>
        <button class="nav-item" data-page="pageProfile" onclick="window.location.href='nft.html'">
            <span class="icon">💎</span>
            Хранилище
        </button>
    </div>

    <!-- ===== ОВЕРЛЕЙ ПОПОЛНЕНИЯ ===== -->
    <div class="deposit-overlay" id="depositOverlay">
        <div class="deposit-card">
            <div class="title">⭐ Пополнить баланс</div>
            <div class="sub">Купи монеты за Telegram Stars</div>
            <div class="balance-show"><span>💰</span> <span id="depositBalance">1000</span></div>
            <div class="deposit-options">
                <div class="option" onclick="buyCoins(10, 100)">
                    <div class="left"><div class="icon">⭐</div><div class="info"><div class="name">10 Stars</div><div class="desc">+100 монет</div></div></div>
                    <div class="right">+100</div>
                </div>
                <div class="option" onclick="buyCoins(25, 300)">
                    <div class="left"><div class="icon">⭐</div><div class="info"><div class="name">25 Stars</div><div class="desc">+300 монет</div></div></div>
                    <div class="right">+300</div>
                </div>
                <div class="option" onclick="buyCoins(50, 700)" style="border-color: rgba(247,212,74,0.15); background: rgba(247,212,74,0.04);">
                    <div class="left"><div class="icon">⭐</div><div class="info"><div class="name">50 Stars</div><div class="desc">+700 монет</div></div></div>
                    <div class="right" style="color:#f7d44a;">🔥 +700</div>
                </div>
                <div class="option" onclick="buyCoins(100, 1500)">
                    <div class="left"><div class="icon">⭐</div><div class="info"><div class="name">100 Stars</div><div class="desc">+1500 монет</div></div></div>
                    <div class="right">+1500</div>
                </div>
            </div>
            <button class="deposit-close" onclick="closeDeposit()">✕ Закрыть</button>
        </div>
    </div>

    <script>
        // ============================
        // 1. БАЛАНС
        // ============================
        let balance = parseInt(localStorage.getItem('casinoBalance')) || 1000;

        function updateAllBalances() {
            document.getElementById('balanceDisplay').textContent = balance;
            document.querySelectorAll('[id^="headerStars"]').forEach(el => {
                el.textContent = Math.floor(balance / 10);
            });
            document.getElementById('depositBalance').textContent = balance;
            localStorage.setItem('casinoBalance', balance);
        }
        updateAllBalances();

        // ============================
        // 2. КЕЙСЫ С АНИМАЦИЕЙ
        // ============================
        function openCase(type) {
            const rewards = {
                'free': { min: 5, max: 25, emoji: '📦', name: 'Free Case' },
                'birthday': { min: 20, max: 80, emoji: '🎂', name: 'HAPPY B-DAY' }
            };
            const data = rewards[type] || rewards['free'];
            const reward = Math.floor(Math.random() * (data.max - data.min + 1)) + data.min;

            // Показываем анимацию
            const rewardEl = document.getElementById('caseReward');
            document.getElementById('rewardEmoji').textContent = data.emoji;
            document.getElementById('rewardText').textContent = '+' + reward + ' монет';
            document.getElementById('rewardSub').textContent = data.name + ' открыт!';
            rewardEl.classList.add('show');

            // Начисляем монеты
            balance += reward;
            updateAllBalances();

            // Скрываем через 3 секунды
            clearTimeout(window.rewardTimeout);
            window.rewardTimeout = setTimeout(() => {
                rewardEl.classList.remove('show');
            }, 3000);

            showToast('🎁 ' + data.emoji + ' ' + data.name + ' +' + reward + ' монет!', true);
        }

        // ============================
        // 3. ПОПОЛНЕНИЕ
        // ============================
        function openDeposit() {
            document.getElementById('depositOverlay').classList.add('show');
            document.getElementById('depositBalance').textContent = balance;
        }

        function closeDeposit() {
            document.getElementById('depositOverlay').classList.remove('show');
        }

        function buyCoins(starsCost, coinsAmount) {
            if (window.Telegram && window.Telegram.WebApp) {
                window.Telegram.WebApp.sendData(JSON.stringify({
                    action: 'buy_coins',
                    stars: starsCost,
                    coins: coinsAmount
                }));
                showToast(`⏳ Запрос на ${coinsAmount} монет за ${starsCost} Stars...`);
            } else {
                balance += coinsAmount;
                updateAllBalances();
                closeDeposit();
                showToast(`✅ +${coinsAmount} монет (демо)`);
            }
        }

        // ============================
        // 4. TOAST
        // ============================
        function showToast(msg, isWin = true) {
            const toast = document.createElement('div');
            toast.style.cssText = `
                    position: fixed; top: 80px; left: 50%; transform: translateX(-50%);
                    background: rgba(12,14,28,0.92); backdrop-filter: blur(16px);
                    color: #f0eee0; padding: 12px 24px; border-radius: 60px; z-index: 9999;
                    max-width: 90%; border: 1px solid ${isWin ? 'rgba(247,212,74,0.1)' : 'rgba(231,76,60,0.1)'};
                    font-size: 15px; font-weight: 500;
                    box-shadow: 0 16px 50px rgba(0,0,0,0.3);
                    animation: fadeIn 0.35s ease-out;
                `;
            toast.textContent = msg;
            document.body.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transition = 'opacity 0.3s';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        // ============================
        // 5. НАВИГАЦИЯ
        // ============================
        const navItems = document.querySelectorAll('.nav-item');
        const pages = {
            pageHome: document.getElementById('pageHome'),
            pageProfile: document.getElementById('pageProfile')
        };

        navItems.forEach(item => {
            item.addEventListener('click', function() {
                navItems.forEach(n => n.classList.remove('active'));
                this.classList.add('active');

                const pageId = this.dataset.page;
                Object.keys(pages).forEach(key => {
                    pages[key].style.display = key === pageId ? 'block' : 'none';
                });
            });
        });

        // ============================
        // 6. ПРОФИЛЬ
        // ============================
        if (window.Telegram && window.Telegram.WebApp) {
            const user = window.Telegram.WebApp.initDataUnsafe.user;
            if (user) {
                document.getElementById('profileName').textContent = user.first_name || 'Игрок';
                document.getElementById('profileId').textContent = 'ID: ' + user.id;
            }
        }

        // ============================
        // 7. СТАРТ
        // ============================
        if (balance === 1000) {
            setTimeout(() => showToast('🐰 Добро пожаловать в Rabbits!'), 400);
        }

        console.log('🐰 Rabbits загружен!');
        console.log('💰 Баланс:', balance);
        console.log('🎁 Кейсы с анимацией готовы!');
    </script>
</body>
</html>
