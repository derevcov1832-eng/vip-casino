<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🎮 Игры</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #0a0a1a;
            color: white;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        .bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            background:
                radial-gradient(ellipse at 20% 30%, rgba(180, 80, 255, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 70%, rgba(255, 50, 50, 0.05) 0%, transparent 50%);
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 400px;
            width: 100%;
            text-align: center;
        }

        .back-btn {
            display: inline-block;
            color: rgba(255, 255, 255, 0.4);
            text-decoration: none;
            font-size: 15px;
            padding: 8px 20px;
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: 40px;
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(8px);
            transition: 0.25s;
            margin-bottom: 20px;
        }
        .back-btn:active {
            transform: scale(0.94);
            background: rgba(255, 255, 255, 0.05);
        }

        .header h2 {
            font-size: 32px;
            font-weight: 800;
            margin-bottom: 4px;
            background: linear-gradient(135deg, #f7d44a, #ff6b6b, #b388ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 1px;
        }
        .header .sub {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.15);
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 20px;
        }

        .games-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .game-card {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(16px);
            border-radius: 18px;
            padding: 20px 22px;
            border: 1px solid rgba(255, 255, 255, 0.03);
            text-decoration: none;
            color: white;
            display: flex;
            align-items: center;
            gap: 16px;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
        }
        .game-card:active {
            transform: scale(0.96);
            background: rgba(255, 255, 255, 0.04);
        }

        .game-card .icon {
            font-size: 38px;
            width: 56px;
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 14px;
            flex-shrink: 0;
        }
        .game-card .icon.coin {
            background: rgba(247, 212, 74, 0.05);
        }
        .game-card .icon.roulette {
            background: rgba(231, 76, 60, 0.05);
        }
        .game-card .icon.blackjack {
            background: rgba(46, 204, 113, 0.05);
        }

        .game-card .info {
            flex: 1;
            text-align: left;
        }
        .game-card .info .name {
            font-size: 18px;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.9);
        }
        .game-card .info .desc {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.2);
            margin-top: 1px;
            letter-spacing: 0.5px;
        }
        .game-card .badge {
            font-size: 9px;
            padding: 2px 10px;
            border-radius: 40px;
            background: rgba(247, 212, 74, 0.08);
            color: #f7d44a;
            border: 1px solid rgba(247, 212, 74, 0.05);
            letter-spacing: 1px;
        }
        .game-card .arrow {
            font-size: 22px;
            color: rgba(255, 255, 255, 0.05);
            transition: 0.3s;
        }
        .game-card:active .arrow {
            transform: translateX(6px);
            color: rgba(255, 255, 255, 0.15);
        }

        .footer {
            margin-top: 24px;
            font-size: 10px;
            color: rgba(255, 255, 255, 0.04);
            letter-spacing: 3px;
        }

        /* ===== БАЛАНС В ХЕДЕРЕ ===== */
        .balance-mini {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            background: rgba(255, 255, 255, 0.03);
            padding: 6px 16px;
            border-radius: 40px;
            font-size: 14px;
            font-weight: 600;
            color: #f7d44a;
            border: 1px solid rgba(255, 255, 255, 0.03);
            margin-bottom: 16px;
            display: inline-block;
        }
        .balance-mini span {
            font-size: 16px;
        }

        @media (max-width: 400px) {
            .game-card {
                padding: 16px 16px;
            }
            .game-card .icon {
                font-size: 30px;
                width: 48px;
                height: 48px;
            }
            .game-card .info .name {
                font-size: 16px;
            }
            .header h2 {
                font-size: 26px;
            }
        }
    </style>
</head>
<body>

    <div class="bg"></div>

    <div class="container">
        <a href="index.html" class="back-btn">← Назад</a>

        <div class="header">
            <h2>🎮 Игры</h2>
            <div class="sub">Выбери игру и выигрывай!</div>
        </div>

        <div class="balance-mini">
            <span>💰</span> <span id="balanceDisplay">1000</span>
        </div>

        <div class="games-grid">
            <!-- ===== МОНЕТКА ===== -->
            <a href="coin.html" class="game-card">
                <div class="icon coin">🪙</div>
                <div class="info">
                    <div class="name">Монетка</div>
                    <div class="desc">Орёл или решка до x100</div>
                </div>
                <div class="badge">🔥</div>
                <div class="arrow">›</div>
            </a>

            <!-- ===== РУЛЕТКА ===== -->
            <a href="roulette.html" class="game-card">
                <div class="icon roulette">🎡</div>
                <div class="info">
                    <div class="name">Рулетка</div>
                    <div class="desc">Красное / Чёрное</div>
                </div>
                <div class="badge">🎯</div>
                <div class="arrow">›</div>
            </a>

            <!-- ===== БЛЭКДЖЕК ===== -->
            <a href="blackjack.html" class="game-card">
                <div class="icon blackjack">🃏</div>
                <div class="info">
                    <div class="name">Блэкджек</div>
                    <div class="desc">21 против дилера</div>
                </div>
                <div class="badge">♠</div>
                <div class="arrow">›</div>
            </a>
        </div>

        <div class="footer">Сделано с ❤️ в Telegram Mini App</div>
    </div>

    <script>
        // ===== БАЛАНС =====
        let balance = parseInt(localStorage.getItem('casinoBalance')) || 1000;
        document.getElementById('balanceDisplay').textContent = balance;

        window.addEventListener('focus', function() {
            balance = parseInt(localStorage.getItem('casinoBalance')) || 1000;
            document.getElementById('balanceDisplay').textContent = balance;
        });

        console.log('🎮 Страница игр загружена!');
        console.log('💰 Баланс:', balance);
    </script>
</body>
</html>
