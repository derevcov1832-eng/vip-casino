<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🎮 Mini Games</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, 'Segoe UI', system-ui, sans-serif;
            background: #0a0a12;
            color: #fff;
            min-height: 100vh;
            overflow: hidden;
            user-select: none;
        }

        .app {
            max-width: 430px;
            width: 100%;
            height: 100vh;
            margin: 0 auto;
            background: radial-gradient(ellipse at 50% 0%, #141428 0%, #0a0a12 70%);
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }

        /* ===== HEADER ===== */
        .header {
            padding: 16px 20px 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }
        .header .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 20px;
            font-weight: 800;
            color: #fff;
            text-decoration: none;
            cursor: pointer;
        }
        .header .logo img {
            width: 32px;
            height: 32px;
        }
        .header .logo span {
            background: linear-gradient(135deg, #f7971e, #ffd200);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .header .coins {
            display: flex;
            align-items: center;
            gap: 6px;
            background: rgba(255, 255, 255, 0.04);
            padding: 4px 12px 4px 8px;
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.04);
            cursor: pointer;
        }
        .header .coins img {
            width: 16px;
            height: 16px;
        }
        .header .coins .value {
            font-size: 14px;
            font-weight: 700;
            color: #ffd700;
        }

        /* ===== BACK BUTTON ===== */
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: rgba(255, 255, 255, 0.2);
            font-size: 14px;
            text-decoration: none;
            padding: 8px 0;
            cursor: pointer;
            border: none;
            background: none;
        }
        .back-btn:active {
            opacity: 0.5;
        }

        /* ===== CONTENT ===== */
        .content {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 0 20px 80px;
        }

        /* ===== TITLE ===== */
        .page-title {
            font-size: 24px;
            font-weight: 800;
            color: #fff;
            margin-bottom: 30px;
            text-align: center;
        }
        .page-title span {
            background: linear-gradient(135deg, #f7971e, #ffd200);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* ===== GAME LIST ===== */
        .game-list {
            width: 100%;
            max-width: 320px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .game-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 20px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.03);
            cursor: pointer;
            transition: 0.2s;
            text-decoration: none;
            color: #fff;
        }
        .game-item:active {
            transform: scale(0.96);
            background: rgba(255, 255, 255, 0.04);
        }
        .game-item .left {
            display: flex;
            align-items: center;
            gap: 14px;
        }
        .game-item .left .icon {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.03);
            font-size: 24px;
        }
        .game-item .left .icon img {
            width: 28px;
            height: 28px;
            object-fit: contain;
        }
        .game-item .left .info .name {
            font-size: 16px;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.9);
        }
        .game-item .left .info .desc {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.15);
            margin-top: 2px;
        }
        .game-item .arrow {
            color: rgba(255, 255, 255, 0.1);
            font-size: 14px;
        }

        /* ===== NAV ===== */
        .nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(10, 10, 18, 0.96);
            backdrop-filter: blur(16px);
            border-top: 1px solid rgba(255, 255, 255, 0.03);
            display: flex;
            justify-content: space-around;
            padding: 6px 0 10px;
            max-width: 430px;
            margin: 0 auto;
            z-index: 100;
        }
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1px;
            color: rgba(255, 255, 255, 0.12);
            font-size: 8px;
            font-weight: 500;
            letter-spacing: 0.5px;
            background: none;
            border: none;
            cursor: pointer;
            padding: 4px 12px;
            transition: 0.3s;
            position: relative;
        }
        .nav-item img {
            width: 24px;
            height: 24px;
            object-fit: contain;
            opacity: 0.35;
            transition: 0.3s;
        }
        .nav-item.active img {
            opacity: 1;
        }
        .nav-item .label {
            color: rgba(255, 255, 255, 0.12);
            transition: 0.3s;
        }
        .nav-item.active .label {
            color: #ffd700;
        }
        .nav-item:active {
            transform: scale(0.9);
        }
        .nav-item.rabbit img {
            width: 40px;
            height: 40px;
            margin-top: -10px;
            opacity: 1;
            filter: drop-shadow(0 4px 20px rgba(247, 212, 74, 0.15));
        }
        .nav-item.rabbit.active img {
            filter: drop-shadow(0 4px 30px rgba(247, 212, 74, 0.3));
        }

        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(12, 14, 28, 0.92);
            backdrop-filter: blur(16px);
            color: #f0eee0;
            padding: 10px 22px;
            border-radius: 60px;
            display: none;
            z-index: 999;
            max-width: 90%;
            border: 1px solid rgba(255, 255, 255, 0.03);
            font-size: 14px;
            font-weight: 500;
            box-shadow: 0 16px 50px rgba(0, 0, 0, 0.2);
        }
        .toast.show {
            display: block;
            animation: slideDown 0.3s ease;
        }
        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateX(-50%) scale(0.9);
                top: -40px;
            }
            to {
                opacity: 1;
                transform: translateX(-50%) scale(1);
                top: 20px;
            }
        }
    </style>
</head>
<body>

<div class="app">
    <!-- HEADER -->
    <div class="header">
        <a class="logo" onclick="window.location.href='../../index.html'">
            <img src="https://cdn-icons-png.flaticon.com/512/616/616408.png" alt="Логотип">
            <span>Rabbits</span>
        </a>
        <div class="coins" onclick="showToast('💰 Баланс: 0.00 ₽')">
            <img src="https://cdn-icons-png.flaticon.com/512/1828/1828884.png" alt="Монеты">
            <span class="value">0</span>
        </div>
    </div>

    <!-- CONTENT -->
    <div class="content">
        <!-- BACK -->
        <button class="back-btn" onclick="window.location.href='../../index.html'">
            <i class="fas fa-arrow-left"></i> Назад
        </button>

        <!-- TITLE -->
        <div class="page-title">
            <span>Mini Games</span>
        </div>

        <!-- GAME LIST -->
        <div class="game-list">
            <a href="coin.html" class="game-item">
                <div class="left">
                    <div class="icon">
                        <img src="https://cdn-icons-png.flaticon.com/512/1828/1828884.png" alt="Монетка">
                    </div>
                    <div class="info">
                        <div class="name">МОНЕТКА</div>
                        <div class="desc">Орёл или решка</div>
                    </div>
                </div>
                <div class="arrow"><i class="fas fa-chevron-right"></i></div>
            </a>

            <a href="roulette.html" class="game-item">
                <div class="left">
                    <div class="icon">
                        <img src="https://cdn-icons-png.flaticon.com/512/1045/1045516.png" alt="Рулетка">
                    </div>
                    <div class="info">
                        <div class="name">РУЛЕТКА</div>
                        <div class="desc">Крути колесо</div>
                    </div>
                </div>
                <div class="arrow"><i class="fas fa-chevron-right"></i></div>
            </a>

            <a href="blackjack.html" class="game-item">
                <div class="left">
                    <div class="icon">
                        <img src="https://cdn-icons-png.flaticon.com/512/1045/1045485.png" alt="Блэкджек">
                    </div>
                    <div class="info">
                        <div class="name">БЛЭКДЖЕК</div>
                        <div class="desc">21 очко</div>
                    </div>
                </div>
                <div class="arrow"><i class="fas fa-chevron-right"></i></div>
            </a>
        </div>
    </div>

    <!-- NAV -->
    <div class="nav">
        <button class="nav-item" onclick="showToast('🏆 Топ игроков')">
            <img src="https://cdn-icons-png.flaticon.com/512/1828/1828884.png" alt="Топ">
            <span class="label">Топ</span>
        </button>
        <button class="nav-item" onclick="window.location.href='../../index.html'">
            <img src="https://cdn-icons-png.flaticon.com/512/1828/1828793.png" alt="Главная">
            <span class="label">Главная</span>
        </button>
        <button class="nav-item rabbit active" onclick="showToast('🐰 Rabbit')">
            <img src="https://cdn-icons-png.flaticon.com/512/616/616408.png" alt="Rabbit">
            <span class="label">Rabbit</span>
        </button>
        <button class="nav-item" onclick="window.location.href='../profile/profile.html'">
            <img src="https://cdn-icons-png.flaticon.com/512/1828/1828478.png" alt="Профиль">
            <span class="label">Профиль</span>
        </button>
    </div>
</div>

<div class="toast" id="toast"></div>

<script>
    let toastTimer = null;

    function showToast(msg) {
        const toast = document.getElementById('toast');
        toast.textContent = msg;
        toast.classList.add('show');
        clearTimeout(toastTimer);
        toastTimer = setTimeout(() => toast.classList.remove('show'), 2400);
    }

    document.querySelectorAll('.nav-item').forEach(item => {
        item.addEventListener('click', function() {
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            this.classList.add('active');
        });
    });

    setTimeout(() => showToast('🎮 Добро пожаловать в Mini Games!'), 400);
</script>

</body>
</html>
