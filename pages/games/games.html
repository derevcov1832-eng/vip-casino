<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🎮 Игры — VIP Casino</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #0a0a1a;
            color: white;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 16px;
            position: relative;
        }
        .bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            background:
                radial-gradient(ellipse at 20% 30%, rgba(180, 80, 255, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 70%, rgba(255, 50, 50, 0.05) 0%, transparent 50%);
        }
        .container {
            position: relative;
            z-index: 1;
            max-width: 480px;
            width: 100%;
            padding-bottom: 30px;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
            margin-bottom: 16px;
        }
        .header .logo {
            font-size: 22px;
            font-weight: 800;
            background: linear-gradient(135deg, #f7d44a, #ff6b6b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            cursor: pointer;
        }
        .header .back {
            color: rgba(255, 255, 255, 0.4);
            text-decoration: none;
            font-size: 14px;
            padding: 6px 16px;
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: 40px;
            background: rgba(255, 255, 255, 0.02);
        }
        .header .back:active {
            transform: scale(0.94);
        }

        .games-grid {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-top: 8px;
        }

        /* ===== СТИЛЬ КАРТОЧКИ С ПРЕВЬЮ ===== */
        .game-card {
            display: block;
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(12px);
            border-radius: 18px;
            border: 1px solid rgba(255, 255, 255, 0.03);
            text-decoration: none;
            color: white;
            overflow: hidden;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
            cursor: pointer;
        }
        .game-card:active {
            transform: scale(0.97);
        }

        .game-card .preview {
            width: 100%;
            height: 160px;
            background-size: cover;
            background-position: center;
            position: relative;
        }
        .game-card .preview .gradient {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 60%;
            background: linear-gradient(to top, rgba(0, 0, 0, 0.7), transparent);
        }
        .game-card .preview .play-btn {
            position: absolute;
            bottom: 12px;
            right: 12px;
            background: linear-gradient(145deg, #f7d44a, #dbb84a);
            color: #1a1a2e;
            padding: 6px 16px;
            border-radius: 40px;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 1px;
            box-shadow: 0 4px 15px rgba(247, 212, 74, 0.3);
        }

        .game-card .info {
            padding: 14px 18px 18px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .game-card .info .icon {
            width: 44px;
            height: 44px;
            background: rgba(247, 212, 74, 0.08);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }
        .game-card .info .text {
            flex: 1;
            text-align: left;
        }
        .game-card .info .text .name {
            font-size: 17px;
            font-weight: 700;
        }
        .game-card .info .text .desc {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.3);
            margin-top: 1px;
        }
        .game-card .info .badge {
            font-size: 9px;
            padding: 2px 10px;
            border-radius: 40px;
            background: rgba(247, 212, 74, 0.08);
            color: #f7d44a;
            border: 1px solid rgba(247, 212, 74, 0.05);
            letter-spacing: 1px;
        }
        .game-card .info .arrow {
            font-size: 20px;
            color: rgba(255, 255, 255, 0.05);
            transition: 0.3s;
        }
        .game-card:active .info .arrow {
            transform: translateX(6px);
            color: rgba(255, 255, 255, 0.15);
        }

        /* ===== НИЖНЯЯ НАВИГАЦИЯ ===== */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(10, 10, 26, 0.92);
            backdrop-filter: blur(16px);
            border-top: 1px solid rgba(255, 255, 255, 0.03);
            display: flex;
            justify-content: space-around;
            padding: 8px 0 12px;
            max-width: 480px;
            margin: 0 auto;
            z-index: 100;
        }
        .bottom-nav .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            text-decoration: none;
            color: rgba(255, 255, 255, 0.15);
            font-size: 9px;
            font-weight: 500;
            letter-spacing: 0.5px;
            transition: 0.3s;
            background: none;
            border: none;
            cursor: pointer;
            padding: 4px 16px;
        }
        .bottom-nav .nav-item .icon {
            font-size: 22px;
            transition: 0.3s;
        }
        .bottom-nav .nav-item.active {
            color: #f7d44a;
        }
        .bottom-nav .nav-item.active .icon {
            transform: translateY(-2px);
        }
        .bottom-nav .nav-item:active {
            transform: scale(0.9);
        }
    </style>
</head>
<body>

    <div class="bg"></div>

    <div class="container">
        <!-- ===== ХЕДЕР ===== -->
        <div class="header">
            <div class="logo" onclick="window.location.href='../home/home.html'">🎰 VIP CASINO</div>
            <a href="../home/home.html" class="back">← Назад</a>
        </div>

        <!-- ===== СЕТКА ИГР С КАРТИНКАМИ-ПРЕВЬЮ ===== -->
        <div class="games-grid">

            <!-- ===== МОНЕТКА (С ТВОИМ ФОТО) ===== -->
            <a href="coin.html" class="game-card">
                <div class="preview" style="background-image: url('https://rabbits.gift/assets/coin.webp');">
                    <div class="gradient"></div>
                    <div class="play-btn">▶ ИГРАТЬ</div>
                </div>
                <div class="info">
                    <div class="icon">🪙</div>
                    <div class="text">
                        <div class="name">Монетка</div>
                        <div class="desc">Орёл или решка до x100</div>
                    </div>
                    <div class="badge">🔥</div>
                    <div class="arrow">›</div>
                </div>
            </a>

            <!-- ===== РУЛЕТКА ===== -->
            <a href="roulette.html" class="game-card">
                <div class="preview" style="background-image: url('https://images.unsplash.com/photo-1606167668584-78701c57f13d?w=400&h=200&fit=crop');">
                    <div class="gradient"></div>
                    <div class="play-btn">▶ ИГРАТЬ</div>
                </div>
                <div class="info">
                    <div class="icon">🎡</div>
                    <div class="text">
                        <div class="name">Рулетка</div>
                        <div class="desc">Красное / Чёрное</div>
                    </div>
                    <div class="badge">🎯</div>
                    <div class="arrow">›</div>
                </div>
            </a>

            <!-- ===== БЛЭКДЖЕК ===== -->
            <a href="blackjack.html" class="game-card">
                <div class="preview" style="background-image: url('https://images.unsplash.com/photo-1541278107930-e5d7a3d5e4b8?w=400&h=200&fit=crop');">
                    <div class="gradient"></div>
                    <div class="play-btn">▶ ИГРАТЬ</div>
                </div>
                <div class="info">
                    <div class="icon">🃏</div>
                    <div class="text">
                        <div class="name">Блэкджек</div>
                        <div class="desc">21 против дилера</div>
                    </div>
                    <div class="badge">♠</div>
                    <div class="arrow">›</div>
                </div>
            </a>

        </div>
    </div>

    <!-- ===== НИЖНЯЯ НАВИГАЦИЯ ===== -->
    <div class="bottom-nav" id="bottomNav">
        <button class="nav-item" onclick="window.location.href='../home/home.html'">
            <span class="icon">🏠</span> Главная
        </button>
        <button class="nav-item active" onclick="window.location.href='../games/games.html'">
            <span class="icon">🎮</span> Игры
        </button>
        <button class="nav-item" onclick="window.location.href='../nft/nft.html'">
            <span class="icon">💎</span> Хранилище
        </button>
        <button class="nav-item" onclick="window.location.href='../profile/profile.html'">
            <span class="icon">👤</span> Профиль
        </button>
    </div>

</body>
</html>
