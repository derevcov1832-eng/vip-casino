<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🎮 Игры — VIP Casino</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #0a0a1a;
            color: white;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 16px;
            position: relative;
        }
        .bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            background:
                radial-gradient(ellipse at 20% 30%, rgba(180, 80, 255, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 70%, rgba(255, 50, 50, 0.05) 0%, transparent 50%);
        }
        .container {
            position: relative;
            z-index: 1;
            max-width: 480px;
            width: 100%;
            padding-bottom: 80px;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
            margin-bottom: 16px;
        }
        .header .logo {
            font-size: 22px;
            font-weight: 800;
            background: linear-gradient(135deg, #f7d44a, #ff6b6b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            cursor: pointer;
        }
        .header .back {
            color: rgba(255, 255, 255, 0.4);
            text-decoration: none;
            font-size: 14px;
            padding: 6px 16px;
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: 40px;
            background: rgba(255, 255, 255, 0.02);
        }
        .header .back:active {
            transform: scale(0.94);
        }

        .games-title {
            font-size: 18px;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.4);
            letter-spacing: 2px;
            margin-bottom: 16px;
            text-transform: uppercase;
            text-align: center;
        }

        .games-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 12px;
        }

        .game-card {
            aspect-ratio: 1 / 1;
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.03);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            cursor: pointer;
            background: rgba(255, 255, 255, 0.02);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .game-card:active {
            transform: scale(0.94);
        }

        .game-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: 0.3s;
        }
        .game-card:active img {
            transform: scale(1.05);
        }

        .game-card .fallback {
            font-size: 48px;
            opacity: 0.1;
        }

        /* ===== НИЖНЯЯ НАВИГАЦИЯ ===== */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(10, 10, 26, 0.92);
            backdrop-filter: blur(16px);
            border-top: 1px solid rgba(255, 255, 255, 0.03);
            display: flex;
            justify-content: space-around;
            padding: 8px 0 12px;
            max-width: 480px;
            margin: 0 auto;
            z-index: 100;
        }
        .bottom-nav .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            text-decoration: none;
            color: rgba(255, 255, 255, 0.15);
            font-size: 9px;
            font-weight: 500;
            letter-spacing: 0.5px;
            transition: 0.3s;
            background: none;
            border: none;
            cursor: pointer;
            padding: 4px 16px;
        }
        .bottom-nav .nav-item .icon {
            font-size: 22px;
            transition: 0.3s;
        }
        .bottom-nav .nav-item.active {
            color: #f7d44a;
        }
        .bottom-nav .nav-item.active .icon {
            transform: translateY(-2px);
        }
        .bottom-nav .nav-item:active {
            transform: scale(0.9);
        }
    </style>
</head>
<body>

    <div class="bg"></div>

    <div class="container">
        <!-- ===== ХЕДЕР ===== -->
        <div class="header">
            <div class="logo" onclick="window.location.href='../home/home.html'">🎰 VIP CASINO</div>
            <a href="../home/home.html" class="back">← Назад</a>
        </div>

        <!-- ===== ЗАГОЛОВОК ===== -->
        <div class="games-title">🎮 МИНИ ИГРЫ</div>

        <!-- ===== СЕТКА ИГР ===== -->
        <div class="games-grid">

            <!-- КОИН ФЛИП -->
            <a href="coin.html" class="game-card">
                <img src="https://img.freepik.com/free-vector/clover-coin-design_25030-68425.jpg?semt=ais_hybrid" alt="КОИН ФЛИП" loading="lazy">
            </a>

            <!-- РУЛЕТКА -->
            <a href="roulette.html" class="game-card">
                <img src="https://media.istockphoto.com/id/2150019479/ru/%D0%B2%D0%B5%D0%BA%D1%82%D0%BE%D1%80%D0%BD%D0%B0%D1%8F/%D0%BA%D0%BE%D0%BB%D0%B5%D1%81%D0%BE-%D1%80%D1%83%D0%BB%D0%B5%D1%82%D0%BA%D0%B8-%D0%BA%D0%BE%D0%BB%D0%B5%D1%81%D0%BE-%D1%80%D1%83%D0%BB%D0%B5%D1%82%D0%BA%D0%B8-%D0%BA%D0%B0%D0%B7%D0%B8%D0%BD%D0%BE-%D0%B2%D0%B5%D0%BA%D1%82%D0%BE%D1%80%D0%BD%D1%8B%D0%B9-%D0%BA%D0%BB%D0%B8%D0%BF%D0%B0%D1%80%D1%82-%D0%B8%D0%B7%D0%BE%D0%BB%D0%B8%D1%80%D0%BE%D0%B2%D0%B0%D0%BD-%D0%BD%D0%B0-%D1%82%D0%B5%D0%BC%D0%BD%D0%BE%D0%BC-%D1%84%D0%BE%D0%BD%D0%B5.jpg?s=612x612&w=0&k=20&c=5yvDRPYRi1bZvJX0O-481UFx72FTwiUu460LR9vEolE=" alt="РУЛЕТКА" loading="lazy">
            </a>

            <!-- БЛЭКДЖЕК -->
            <a href="blackjack.html" class="game-card">
                <img src="https://avatars.mds.yandex.net/i?id=7e6043580ae7c3b02624d4116e7b27c7_l-5876942-images-thumbs&n=13" alt="БЛЭКДЖЕК" loading="lazy">
            </a>

        </div>
    </div>

    <!-- ===== НИЖНЯЯ НАВИГАЦИЯ ===== -->
    <div class="bottom-nav" id="bottomNav">
        <button class="nav-item" onclick="window.location.href='../home/home.html'">
            <span class="icon">🏠</span> Главная
        </button>
        <button class="nav-item active" onclick="window.location.href='../games/games.html'">
            <span class="icon">🎮</span> Игры
        </button>
        <button class="nav-item" onclick="window.location.href='../nft/nft.html'">
            <span class="icon">💎</span> Хранилище
        </button>
        <button class="nav-item" onclick="window.location.href='../profile/profile.html'">
            <span class="icon">👤</span> Профиль
        </button>
    </div>

</body>
</html>
