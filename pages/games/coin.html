<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🪙 КОИН ФЛИП</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #0a0a1a;
            color: white;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 16px;
            position: relative;
            user-select: none;
        }

        .bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            background:
                radial-gradient(ellipse at 20% 30%, rgba(247, 212, 74, 0.04) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 70%, rgba(180, 80, 255, 0.04) 0%, transparent 50%);
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 480px;
            width: 100%;
            padding-bottom: 80px;
        }

        .back-btn {
            color: rgba(255, 255, 255, 0.4);
            text-decoration: none;
            font-size: 14px;
            padding: 6px 16px;
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: 40px;
            background: rgba(255, 255, 255, 0.02);
            display: inline-block;
            margin-bottom: 8px;
        }
        .back-btn:active {
            transform: scale(0.94);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 4px 0 8px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            margin-bottom: 10px;
        }
        .header .title {
            font-size: 18px;
            font-weight: 700;
            color: #f7d44a;
            letter-spacing: 2px;
        }
        .header .balance {
            font-size: 16px;
            font-weight: 600;
            color: #f7e3a0;
            background: rgba(255, 255, 255, 0.05);
            padding: 4px 14px;
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.04);
        }

        /* ===== МОНЕТКА ===== */
        .coin-display {
            margin: 12px auto;
            perspective: 800px;
            width: 220px;
            height: 220px;
            cursor: pointer;
        }
        .coin {
            width: 220px;
            height: 220px;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.6s cubic-bezier(0.34, 1.2, 0.64, 1);
            border-radius: 50%;
        }
        .coin.flipping {
            transition: transform 1.8s cubic-bezier(0.23, 1, 0.32, 1);
        }
        .coin-face {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 4px solid rgba(255, 215, 100, 0.12);
            box-shadow: 0 0 40px rgba(247, 212, 74, 0.04);
            overflow: hidden;
        }
        .coin-heads {
            transform: rotateY(0deg);
            background: radial-gradient(circle at 30% 30%, #ffe28a, #d4a017);
        }
        .coin-heads img {
            width: 80%;
            height: 80%;
            object-fit: contain;
            filter: drop-shadow(0 0 30px rgba(247, 212, 74, 0.12));
        }
        .coin-tails {
            transform: rotateY(180deg);
            background: radial-gradient(circle at 30% 30%, #e8e8e8, #8a8a8a);
        }
        .coin-tails img {
            width: 80%;
            height: 80%;
            object-fit: contain;
            filter: drop-shadow(0 0 30px rgba(200, 200, 200, 0.12));
        }

        /* ===== СТАТИСТИКА ===== */
        .stats {
            display: flex;
            justify-content: space-around;
            margin: 8px 0 10px;
            padding: 10px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 14px;
            border: 1px solid rgba(255, 255, 255, 0.03);
        }
        .stats .stat {
            text-align: center;
        }
        .stats .stat .num {
            font-size: 20px;
            font-weight: 700;
            color: #f7d44a;
        }
        .stats .stat .lbl {
            font-size: 9px;
            color: rgba(255, 255, 255, 0.15);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 2px;
        }

        /* ===== ШАНСЫ ===== */
        .chances {
            display: flex;
            gap: 12px;
            margin: 8px 0 10px;
        }
        .chances .chance {
            flex: 1;
            padding: 10px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 14px;
            border: 1px solid rgba(255, 255, 255, 0.03);
            text-align: center;
        }
        .chances .chance .label {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.2);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .chances .chance .value {
            font-size: 22px;
            font-weight: 700;
            color: #f7d44a;
            margin-top: 2px;
        }

        /* ===== ВЫБОР СТОРОНЫ ===== */
        .choices {
            display: flex;
            gap: 12px;
            margin: 8px 0 10px;
        }
        .choices button {
            flex: 1;
            padding: 10px;
            border: 2px solid rgba(255, 255, 255, 0.06);
            border-radius: 14px;
            background: rgba(255, 255, 255, 0.02);
            color: rgba(255, 255, 255, 0.25);
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            letter-spacing: 1px;
        }
        .choices button.active-heads {
            border-color: #f7d44a;
            background: rgba(247, 212, 74, 0.08);
            color: #f7d44a;
        }
        .choices button.active-tails {
            border-color: #bdc3c7;
            background: rgba(255, 255, 255, 0.04);
            color: #bdc3c7;
        }

        /* ===== СТАВКА И РЕЖИМ ===== */
        .settings {
            display: flex;
            gap: 12px;
            margin: 8px 0 12px;
            flex-wrap: wrap;
        }
        .settings .setting {
            flex: 1;
            min-width: 80px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 14px;
            padding: 10px;
            border: 1px solid rgba(255, 255, 255, 0.03);
            text-align: center;
        }
        .settings .setting .label {
            font-size: 10px;
            color: rgba(255, 255, 255, 0.15);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .settings .setting .value {
            font-size: 18px;
            font-weight: 700;
            color: #f7d44a;
            margin-top: 2px;
        }
        .settings .setting .value input {
            width: 80px;
            padding: 6px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.04);
            background: rgba(255, 255, 255, 0.02);
            color: #f0e8d0;
            font-size: 16px;
            font-weight: 700;
            text-align: center;
        }
        .settings .setting .value input:focus {
            outline: none;
            border-color: rgba(247, 212, 74, 0.12);
        }
        .settings .setting .value .mode {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.3);
        }

        /* ===== КНОПКА ИГРАТЬ ===== */
        .play-btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 16px;
            background: linear-gradient(145deg, #f7d44a, #dbb84a);
            color: #1a1a2e;
            font-size: 18px;
            font-weight: 800;
            letter-spacing: 3px;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 6px 30px rgba(247, 212, 74, 0.08);
            margin: 6px 0 4px;
        }
        .play-btn:active {
            transform: scale(0.94);
        }
        .play-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .result {
            font-size: 18px;
            font-weight: 600;
            margin: 6px 0 8px;
            min-height: 28px;
            text-align: center;
            color: rgba(255, 255, 255, 0.2);
        }
        .result.win {
            color: #2ecc71;
        }
        .result.lose {
            color: #e74c3c;
        }

        /* ===== НИЖНЯЯ НАВИГАЦИЯ ===== */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(10, 10, 26, 0.92);
            backdrop-filter: blur(16px);
            border-top: 1px solid rgba(255, 255, 255, 0.03);
            display: flex;
            justify-content: space-around;
            padding: 8px 0 12px;
            max-width: 480px;
            margin: 0 auto;
            z-index: 100;
        }
        .bottom-nav .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            text-decoration: none;
            color: rgba(255, 255, 255, 0.15);
            font-size: 9px;
            font-weight: 500;
            letter-spacing: 0.5px;
            transition: 0.3s;
            background: none;
            border: none;
            cursor: pointer;
            padding: 4px 16px;
        }
        .bottom-nav .nav-item .icon {
            font-size: 22px;
            transition: 0.3s;
        }
        .bottom-nav .nav-item.active {
            color: #f7d44a;
        }
        .bottom-nav .nav-item.active .icon {
            transform: translateY(-2px);
        }
        .bottom-nav .nav-item:active {
            transform: scale(0.9);
        }

        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(12, 14, 28, 0.92);
            backdrop-filter: blur(16px);
            color: #f0eee0;
            padding: 10px 22px;
            border-radius: 60px;
            display: none;
            z-index: 999;
            max-width: 90%;
            border: 1px solid rgba(255, 255, 255, 0.03);
            font-size: 14px;
            font-weight: 500;
            box-shadow: 0 16px 50px rgba(0, 0, 0, 0.2);
        }
        .toast.show {
            display: block;
            animation: slideDown 0.3s ease;
        }
        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateX(-50%) scale(0.9);
                top: -40px;
            }
            to {
                opacity: 1;
                transform: translateX(-50%) scale(1);
                top: 20px;
            }
        }

        .confetti-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 50;
            overflow: hidden;
        }
        .confetti {
            position: absolute;
            width: 7px;
            height: 7px;
            opacity: 0;
            animation: confettiFall linear forwards;
        }
        @keyframes confettiFall {
            0% {
                transform: translateY(-20px) rotate(0deg) scale(1);
                opacity: 1;
            }
            100% {
                transform: translateY(100vh) rotate(720deg) scale(0.3);
                opacity: 0;
            }
        }

        @media (max-width: 450px) {
            .coin-display {
                width: 180px;
                height: 180px;
            }
            .coin {
                width: 180px;
                height: 180px;
            }
            .stats .stat .num {
                font-size: 17px;
            }
            .play-btn {
                font-size: 16px;
                padding: 12px;
            }
            .chances .chance .value {
                font-size: 18px;
            }
            .settings .setting .value input {
                width: 60px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>

    <div class="bg"></div>
    <div class="confetti-container" id="confettiContainer"></div>

    <div class="container">
        <a href="games2.html" class="back-btn">← Назад</a>

        <div class="header">
            <div class="title">🪙 КОИН ФЛИП</div>
            <div class="balance" id="balanceDisplay">💰 1000</div>
        </div>

        <!-- ===== МОНЕТКА ===== -->
        <div class="coin-display" onclick="flipCoin()">
            <div class="coin" id="coin3d">
                <div class="coin-face coin-heads">
                    <img src="https://avatars.mds.yandex.net/i?id=06daadc307f0104047d2cbf89d26590c_sr-10414649-images-thumbs&ref=rim&n=13&w=610&h=610" alt="Орёл">
                </div>
                <div class="coin-face coin-tails">
                    <img src="https://rabbits.gift/assets/reshka.png" alt="Решка">
                </div>
            </div>
        </div>

        <!-- ===== РЕЗУЛЬТАТ ===== -->
        <div class="result" id="coinResult">Выбери сторону</div>

        <!-- ===== СТАТИСТИКА ===== -->
        <div class="stats">
            <div class="stat">
                <div class="num" id="roundNum">0</div>
                <div class="lbl">Раунд</div>
            </div>
            <div class="stat">
                <div class="num" id="multiplierDisplay">×1</div>
                <div class="lbl">Множитель</div>
            </div>
            <div class="stat">
                <div class="num" id="winAmount">0</div>
                <div class="lbl">Выигрыш</div>
            </div>
        </div>

        <!-- ===== ШАНСЫ ===== -->
        <div class="chances">
            <div class="chance">
                <div class="label">🦅 Орёл</div>
                <div class="value" id="headsChance">50%</div>
            </div>
            <div class="chance">
                <div class="label">🪙 Решка</div>
                <div class="value" id="tailsChance">50%</div>
            </div>
        </div>

        <!-- ===== ВЫБОР СТОРОНЫ ===== -->
        <div class="choices">
            <button class="active-heads" id="choiceHeads" onclick="selectChoice('heads')">ОРЁЛ</button>
            <button id="choiceTails" onclick="selectChoice('tails')">РЕШКА</button>
        </div>

        <!-- ===== СТАВКА И РЕЖИМ ===== -->
        <div class="settings">
            <div class="setting">
                <div class="label">💰 Ставка</div>
                <div class="value">
                    <input type="number" id="betInput" value="10" min="5" step="5">
                </div>
            </div>
            <div class="setting">
                <div class="label">⚡ Режим игры</div>
                <div class="value">
                    <span class="mode">Быстрая игра</span>
                </div>
            </div>
            <div class="setting">
                <div class="label">📈 Множитель</div>
                <div class="value">
                    <span class="mode" id="modeMultiplier">×2</span>
                </div>
            </div>
        </div>

        <!-- ===== КНОПКА ИГРАТЬ ===== -->
        <button class="play-btn" onclick="startGame()" id="playBtn">🎮 ИГРАТЬ</button>

        <!-- ===== НИЖНЯЯ НАВИГАЦИЯ ===== -->
        <div class="bottom-nav" id="bottomNav">
            <button class="nav-item" onclick="window.location.href='../home/home.html'">
                <span class="icon">🏠</span> Главная
            </button>
            <button class="nav-item active" onclick="window.location.href='../games/games2.html'">
                <span class="icon">🎮</span> Игры
            </button>
            <button class="nav-item" onclick="window.location.href='../nft/nft.html'">
                <span class="icon">💎</span> Хранилище
            </button>
            <button class="nav-item" onclick="window.location.href='../profile/profile.html'">
                <span class="icon">👤</span> Профиль
            </button>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        // ============================================================
        // 1. ОБРАБОТКА КНОПКИ "НАЗАД" НА ТЕЛЕФОНЕ (ВЫХОД В МЕНЮ)
        // ============================================================
        window.addEventListener('popstate', function(event) {
            window.location.href = '../home/home.html';
        });
        window.history.pushState({ page: 'coinflip' }, '', window.location.href);

        // ============================================================
        // 2. БАЛАНС
        // ============================================================
        let balance = parseInt(localStorage.getItem('casinoBalance')) || 1000;
        document.getElementById('balanceDisplay').textContent = '💰 ' + balance;

        function updateBalance() {
            document.getElementById('balanceDisplay').textContent = '💰 ' + balance;
            localStorage.setItem('casinoBalance', balance);
        }

        // ============================================================
        // 3. ВЫБОР СТОРОНЫ
        // ============================================================
        let playerChoice = 'heads';

        function selectChoice(choice) {
            playerChoice = choice;
            document.getElementById('choiceHeads').className = choice === 'heads' ? 'active-heads' : '';
            document.getElementById('choiceTails').className = choice === 'tails' ? 'active-tails' : '';
            document.getElementById('coinResult').textContent = choice === 'heads' ? '🦅 Выбрал Орёл' : '🪙 Выбрал Решка';
            document.getElementById('coinResult').className = 'result';
        }
        selectChoice('heads');

        // ============================================================
        // 4. ЗВУКИ
        // ============================================================
        function playWinSound() {
            try {
                const ctx = new(window.AudioContext || window.webkitAudioContext)();
                [523, 659, 784, 1047].forEach((freq, i) => {
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.connect(gain);
                    gain.connect(ctx.destination);
                    osc.frequency.value = freq;
                    osc.type = 'sine';
                    gain.gain.value = 0.07;
                    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.18 + i * 0.1);
                    osc.start(ctx.currentTime + i * 0.1);
                    osc.stop(ctx.currentTime + 0.3 + i * 0.1);
                });
            } catch (_) {}
        }

        function playLoseSound() {
            try {
                const ctx = new(window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.frequency.value = 340;
                osc.type = 'sine';
                gain.gain.value = 0.07;
                gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.5);
                osc.start(ctx.currentTime);
                osc.stop(ctx.currentTime + 0.5);
            } catch (_) {}
        }

        function playCoinFlipSound() {
            try {
                const ctx = new(window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.frequency.value = 800;
                osc.type = 'sine';
                gain.gain.value = 0.04;
                gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.06);
                osc.start(ctx.currentTime);
                osc.stop(ctx.currentTime + 0.06);
            } catch (_) {}
        }

        // ============================================================
        // 5. КОНФЕТТИ
        // ============================================================
        function launchConfetti() {
            const container = document.getElementById('confettiContainer');
            const colors = ['#f7d44a', '#ff6b6b', '#2ecc71', '#3498db', '#9b59b6', '#e74c3c', '#f39c12'];
            for (let i = 0; i < 40; i++) {
                const el = document.createElement('div');
                el.className = 'confetti';
                el.style.left = Math.random() * 100 + '%';
                el.style.top = '-10px';
                el.style.background = colors[Math.floor(Math.random() * colors.length)];
                el.style.width = (Math.random() * 6 + 3) + 'px';
                el.style.height = (Math.random() * 6 + 3) + 'px';
                el.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
                el.style.animationDuration = (Math.random() * 2 + 1.5) + 's';
                el.style.animationDelay = (Math.random() * 0.6) + 's';
                container.appendChild(el);
                setTimeout(() => el.remove(), 4000);
            }
        }

        // ============================================================
        // 6. ИГРА
        // ============================================================
        let isFlipping = false;
        let currentMultiplier = 1;
        let currentRound = 0;
        let currentWin = 0;

        function flipCoin() {
            if (isFlipping) return;
            // Подброс только во время игры
        }

        function startGame() {
            if (isFlipping) return;
            const bet = parseInt(document.getElementById('betInput').value) || 10;
            if (bet > balance) {
                document.getElementById('coinResult').textContent = '❌ Недостаточно монет!';
                document.getElementById('coinResult').className = 'result lose';
                return;
            }

            isFlipping = true;
            document.getElementById('playBtn').disabled = true;
            playCoinFlipSound();

            balance -= bet;
            updateBalance();

            const coin = document.getElementById('coin3d');
            const result = Math.random() < 0.5 ? 'heads' : 'tails';
            const isWin = (result === playerChoice);

            const flips = 4 + Math.floor(Math.random() * 4);
            const finalAngle = isWin ? 0 : 180;
            const totalRotation = flips * 360 + finalAngle;

            coin.classList.add('flipping');
            coin.style.transform = `rotateY(${totalRotation}deg)`;
            document.getElementById('coinResult').textContent = '...';

            setTimeout(() => {
                coin.classList.remove('flipping');
                coin.style.transform = `rotateY(${finalAngle}deg)`;

                const resultText = result === 'heads' ? 'Орёл 🦅' : 'Решка 🪙';

                // Обновляем шансы (для красоты)
                const headsChance = (Math.random() * 20 + 40).toFixed(1);
                const tailsChance = (100 - headsChance).toFixed(1);
                document.getElementById('headsChance').textContent = headsChance + '%';
                document.getElementById('tailsChance').textContent = tailsChance + '%';

                if (isWin) {
                    currentRound++;
                    currentMultiplier = Math.min(10, currentMultiplier + 1);
                    currentWin = bet * currentMultiplier;

                    document.getElementById('coinResult').className = 'result win';
                    document.getElementById('coinResult').textContent = '✅ ' + resultText + '! +' + currentWin + ' монет';
                    document.getElementById('roundNum').textContent = currentRound;
                    document.getElementById('multiplierDisplay').textContent = '×' + currentMultiplier;
                    document.getElementById('winAmount').textContent = currentWin;
                    document.getElementById('modeMultiplier').textContent = '×' + currentMultiplier;

                    balance += currentWin;
                    updateBalance();
                    playWinSound();
                    launchConfetti();
                } else {
                    document.getElementById('coinResult').className = 'result lose';
                    document.getElementById('coinResult').textContent = '❌ ' + resultText + '! -' + bet + ' монет';
                    currentRound = 0;
                    currentMultiplier = 1;
                    currentWin = 0;
                    document.getElementById('roundNum').textContent = '0';
                    document.getElementById('multiplierDisplay').textContent = '×1';
                    document.getElementById('winAmount').textContent = '0';
                    document.getElementById('modeMultiplier').textContent = '×2';
                    playLoseSound();
                }

                isFlipping = false;
                document.getElementById('playBtn').disabled = false;
            }, 2000);
        }

        // ============================================================
        // 7. TOAST
        // ============================================================
        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.classList.add('show');
            clearTimeout(t._timeout);
            t._timeout = setTimeout(() => t.classList.remove('show'), 2400);
        }

        // ============================================================
        // 8. СТАРТ
        // ============================================================
        if (balance === 1000) {
