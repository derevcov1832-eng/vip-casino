<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🎡 РУЛЕТКА</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #0a0a1a;
            color: white;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 16px;
            position: relative;
            user-select: none;
        }

        .bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            background:
                radial-gradient(ellipse at 20% 30%, rgba(180, 80, 255, 0.06) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 70%, rgba(255, 50, 50, 0.04) 0%, transparent 50%);
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 480px;
            width: 100%;
            padding-bottom: 80px;
        }

        .back-btn {
            color: rgba(255, 255, 255, 0.4);
            text-decoration: none;
            font-size: 14px;
            padding: 6px 16px;
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: 40px;
            background: rgba(255, 255, 255, 0.02);
            display: inline-block;
            margin-bottom: 8px;
        }
        .back-btn:active {
            transform: scale(0.94);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 4px 0 8px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            margin-bottom: 10px;
        }
        .header .title {
            font-size: 22px;
            font-weight: 800;
            background: linear-gradient(135deg, #ff6b6b, #ffd93d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 2px;
        }
        .header .balance {
            font-size: 16px;
            font-weight: 600;
            color: #f7e3a0;
            background: rgba(255, 255, 255, 0.05);
            padding: 4px 14px;
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.04);
        }

        /* ===== КОЛЕСО ===== */
        .wheel-container {
            position: relative;
            width: 280px;
            height: 280px;
            margin: 6px auto;
        }

        .wheel {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            position: relative;
            border: 4px solid rgba(255, 215, 100, 0.15);
            overflow: hidden;
            transition: transform 4s cubic-bezier(0.17, 0.67, 0.12, 0.99);
            box-shadow: 0 0 60px rgba(255, 50, 50, 0.05);
        }
        .wheel.spinning {
            transition: transform 4s cubic-bezier(0.17, 0.67, 0.12, 0.99);
        }

        .wheel-segment {
            position: absolute;
            width: 50%;
            height: 50%;
            top: 0;
            left: 50%;
            transform-origin: 0% 100%;
            clip-path: polygon(0 0, 100% 0, 50% 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.6);
            text-shadow: 0 1px 3px rgba(0, 0, 0, 0.5);
        }
        .wheel-segment .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.12);
            margin-left: 18px;
        }
        .wheel-segment.red .dot {
            background: rgba(255, 255, 255, 0.25);
        }
        .wheel-segment.black .dot {
            background: rgba(255, 255, 255, 0.06);
        }
        .wheel-segment.green .dot {
            background: rgba(255, 255, 255, 0.4);
        }

        .wheel-center {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 48px;
            height: 48px;
            background: radial-gradient(circle, #f7d44a, #b8860b);
            border-radius: 50%;
            border: 3px solid rgba(255, 255, 255, 0.08);
            z-index: 10;
            box-shadow: 0 0 30px rgba(247, 212, 74, 0.06);
        }
        .wheel-center::after {
            content: '★';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 18px;
            color: #1a1a2e;
        }

        .wheel-arrow {
            position: absolute;
            top: -14px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 32px;
            color: #f7d44a;
            z-index: 20;
            filter: drop-shadow(0 0 20px rgba(247, 212, 74, 0.1));
            animation: arrowPulse 2s ease-in-out infinite;
        }
        @keyframes arrowPulse {
            0%,
            100% {
                transform: translateX(-50%) scale(1);
            }
            50% {
                transform: translateX(-50%) scale(1.06);
            }
        }

        /* ===== РЕЗУЛЬТАТ И СТАТИСТИКА ===== */
        .result-display {
            text-align: center;
            margin: 6px 0 8px;
        }
        .result-display .number {
            font-size: 48px;
            font-weight: 900;
            color: #f7d44a;
            text-shadow: 0 0 40px rgba(247, 212, 74, 0.1);
            min-height: 55px;
        }
        .result-display .color-text {
            font-size: 16px;
            font-weight: 600;
            letter-spacing: 2px;
            margin-top: 2px;
        }
        .result-display .color-text.red {
            color: #e74c3c;
        }
        .result-display .color-text.black {
            color: #bdc3c7;
        }
        .result-display .color-text.green {
            color: #2ecc71;
        }
        .result-display .win-amount {
            font-size: 18px;
            color: #f7d44a;
            margin-top: 4px;
        }

        /* ===== ИСТОРИЯ ВЫПАВШИХ ЧИСЕЛ ===== */
        .history {
            display: flex;
            justify-content: center;
            gap: 6px;
            flex-wrap: wrap;
            margin: 6px 0 10px;
            padding: 8px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.03);
            min-height: 40px;
        }
        .history .ball {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 700;
            color: white;
            text-shadow: 0 1px 3px rgba(0, 0, 0, 0.3);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
        }
        .history .ball.red {
            background: #e74c3c;
        }
        .history .ball.black {
            background: #1a1a2e;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .history .ball.green {
            background: #2ecc71;
        }

        /* ===== КНОПКА ИГРАТЬ ===== */
        .play-btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 16px;
            background: linear-gradient(145deg, #f7d44a, #dbb84a);
            color: #1a1a2e;
            font-size: 18px;
            font-weight: 800;
            letter-spacing: 3px;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 6px 30px rgba(247, 212, 74, 0.08);
            margin: 8px 0 12px;
        }
        .play-btn:active {
            transform: scale(0.94);
        }
        .play-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            transform: none;
        }

        /* ===== СТАВКА ===== */
        .bet-row {
            display: flex;
            align-items: center;
            gap: 12px;
            justify-content: center;
            margin: 6px 0 12px;
            flex-wrap: wrap;
        }
        .bet-row label {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.3);
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        .bet-row input {
            width: 100px;
            padding: 10px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.04);
            background: rgba(255, 255, 255, 0.02);
            color: #f0e8d0;
            font-size: 18px;
            font-weight: 700;
            text-align: center;
        }
        .bet-row input:focus {
            outline: none;
            border-color: rgba(247, 212, 74, 0.15);
        }

        /* ===== КНОПКИ СТАВОК ===== */
        .bet-buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
            margin: 6px 0 10px;
        }
        .bet-buttons button {
            flex: 1;
            padding: 12px 8px;
            border: 2px solid rgba(255, 255, 255, 0.06);
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.02);
            color: rgba(255, 255, 255, 0.3);
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            letter-spacing: 1px;
            min-width: 70px;
        }
        .bet-buttons button.active-red {
            border-color: #e74c3c;
            background: rgba(231, 76, 60, 0.06);
            color: #e74c3c;
        }
        .bet-buttons button.active-black {
            border-color: #bdc3c7;
            background: rgba(255, 255, 255, 0.04);
            color: #bdc3c7;
        }
        .bet-buttons button:active {
            transform: scale(0.94);
        }

        /* ===== НИЖНЯЯ НАВИГАЦИЯ ===== */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(10, 10, 26, 0.92);
            backdrop-filter: blur(16px);
            border-top: 1px solid rgba(255, 255, 255, 0.03);
            display: flex;
            justify-content: space-around;
            padding: 8px 0 12px;
            max-width: 480px;
            margin: 0 auto;
            z-index: 100;
        }
        .bottom-nav .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            text-decoration: none;
            color: rgba(255, 255, 255, 0.15);
            font-size: 9px;
            font-weight: 500;
            letter-spacing: 0.5px;
            transition: 0.3s;
            background: none;
            border: none;
            cursor: pointer;
            padding: 4px 16px;
        }
        .bottom-nav .nav-item .icon {
            font-size: 22px;
            transition: 0.3s;
        }
        .bottom-nav .nav-item.active {
            color: #f7d44a;
        }
        .bottom-nav .nav-item.active .icon {
            transform: translateY(-2px);
        }
        .bottom-nav .nav-item:active {
            transform: scale(0.9);
        }

        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(12, 14, 28, 0.92);
            backdrop-filter: blur(16px);
            color: #f0eee0;
            padding: 10px 22px;
            border-radius: 60px;
            display: none;
            z-index: 999;
            max-width: 90%;
            border: 1px solid rgba(255, 255, 255, 0.03);
            font-size: 14px;
            font-weight: 500;
            box-shadow: 0 16px 50px rgba(0, 0, 0, 0.2);
        }
        .toast.show {
            display: block;
            animation: slideDown 0.3s ease;
        }
        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateX(-50%) scale(0.9);
                top: -40px;
            }
            to {
                opacity: 1;
                transform: translateX(-50%) scale(1);
                top: 20px;
            }
        }

        .confetti-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 50;
            overflow: hidden;
        }
        .confetti {
            position: absolute;
            width: 7px;
            height: 7px;
            opacity: 0;
            animation: confettiFall linear forwards;
        }
        @keyframes confettiFall {
            0% {
                transform: translateY(-20px) rotate(0deg) scale(1);
                opacity: 1;
            }
            100% {
                transform: translateY(100vh) rotate(720deg) scale(0.3);
                opacity: 0;
            }
        }

        @media (max-width: 450px) {
            .wheel-container {
                width: 220px;
                height: 220px;
            }
            .wheel-center {
                width: 40px;
                height: 40px;
            }
            .wheel-center::after {
                font-size: 14px;
            }
            .wheel-arrow {
                font-size: 28px;
                top: -12px;
            }
            .wheel-segment .dot {
                width: 6px;
                height: 6px;
                margin-left: 14px;
            }
            .result-display .number {
                font-size: 38px;
            }
            .bet-buttons button {
                font-size: 12px;
                padding: 10px 6px;
                min-width: 60px;
            }
            .history .ball {
                width: 28px;
                height: 28px;
                font-size: 10px;
            }
        }
    </style>
</head>
<body>

    <div class="bg"></div>
    <div class="confetti-container" id="confettiContainer"></div>

    <div class="container">
        <a href="games2.html" class="back-btn">← Назад</a>

        <div class="header">
            <div class="title">🎡 РУЛЕТКА</div>
            <div class="balance" id="balanceDisplay">💰 1000</div>
        </div>

        <!-- ===== КОЛЕСО ===== -->
        <div class="wheel-container">
            <div class="wheel-arrow">▼</div>
            <div class="wheel" id="wheel"></div>
            <div class="wheel-center"></div>
        </div>

        <!-- ===== РЕЗУЛЬТАТ ===== -->
        <div class="result-display">
            <div class="number" id="resultNumber">0</div>
            <div class="color-text" id="resultColor">Сделай ставку</div>
            <div class="win-amount" id="resultWin"></div>
        </div>

        <!-- ===== ИСТОРИЯ ===== -->
        <div class="history" id="historyContainer">
            <span style="color:rgba(255,255,255,0.1); font-size:12px;">История пуста</span>
        </div>

        <!-- ===== КНОПКА "ИДЕТ ИГРА" ===== -->
        <button class="play-btn" id="spinBtn" onclick="spinRoulette()">🎡 ИДЕТ ИГРА</button>

        <!-- ===== СТАВКА ===== -->
        <div class="bet-row">
            <label>💰 Ставка</label>
            <input type="number" id="betInput" value="50" min="10" step="10">
        </div>

        <!-- ===== ВЫБОР СТАВКИ ===== -->
        <div class="bet-buttons">
            <button id="betRed" onclick="selectBet('red')" class="active-red">🔴 КРАСНОЕ</button>
            <button id="betBlack" onclick="selectBet('black')">⚫ ЧЁРНОЕ</button>
        </div>

        <!-- ===== НИЖНЯЯ НАВИГАЦИЯ ===== -->
        <div class="bottom-nav" id="bottomNav">
            <button class="nav-item" onclick="window.location.href='../home/home.html'">
                <span class="icon">🏠</span> Главная
            </button>
            <button class="nav-item active" onclick="window.location.href='../games/games2.html'">
                <span class="icon">🎮</span> Игры
            </button>
            <button class="nav-item" onclick="window.location.href='../nft/nft.html'">
                <span class="icon">💎</span> Хранилище
            </button>
            <button class="nav-item" onclick="window.location.href='../profile/profile.html'">
                <span class="icon">👤</span> Профиль
            </button>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        // ============================================================
        // 1. ОБРАБОТКА КНОПКИ "НАЗАД" НА ТЕЛЕФОНЕ (ВЫХОД В МЕНЮ)
        // ============================================================
        window.addEventListener('popstate', function(event) {
            window.location.href = '../home/home.html';
        });
        window.history.pushState({ page: 'roulette' }, '', window.location.href);

        // ============================================================
        // 2. БАЛАНС
        // ============================================================
        let balance = parseInt(localStorage.getItem('casinoBalance')) || 1000;
        document.getElementById('balanceDisplay').textContent = '💰 ' + balance;

        function updateBalance() {
            document.getElementById('balanceDisplay').textContent = '💰 ' + balance;
            localStorage.setItem('casinoBalance', balance);
        }

        // ============================================================
        // 3. ЗВУКИ
        // ============================================================
        function playWinSound() {
            try {
                const ctx = new(window.AudioContext || window.webkitAudioContext)();
                [523, 659, 784, 1047].forEach((freq, i) => {
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.connect(gain);
                    gain.connect(ctx.destination);
                    osc.frequency.value = freq;
                    osc.type = 'sine';
                    gain.gain.value = 0.07;
                    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.18 + i * 0.1);
                    osc.start(ctx.currentTime + i * 0.1);
                    osc.stop(ctx.currentTime + 0.3 + i * 0.1);
                });
            } catch (_) {}
        }

        function playLoseSound() {
            try {
                const ctx = new(window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.frequency.value = 340;
                osc.type = 'sine';
                gain.gain.value = 0.07;
                gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.5);
                osc.start(ctx.currentTime);
                osc.stop(ctx.currentTime + 0.5);
            } catch (_) {}
        }

        // ============================================================
        // 4. КОНФЕТТИ
        // ============================================================
        function launchConfetti() {
            const container = document.getElementById('confettiContainer');
            const colors = ['#f7d44a', '#ff6b6b', '#2ecc71', '#3498db', '#9b59b6', '#e74c3c', '#f39c12'];
            for (let i = 0; i < 40; i++) {
                const el = document.createElement('div');
                el.className = 'confetti';
                el.style.left = Math.random() * 100 + '%';
                el.style.top = '-10px';
                el.style.background = colors[Math.floor(Math.random() * colors.length)];
                el.style.width = (Math.random() * 6 + 3) + 'px';
                el.style.height = (Math.random() * 6 + 3) + 'px';
                el.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
                el.style.animationDuration = (Math.random() * 2 + 1.5) + 's';
                el.style.animationDelay = (Math.random() * 0.6) + 's';
                container.appendChild(el);
                setTimeout(() => el.remove(), 4000);
            }
        }

        // ============================================================
        // 5. КОЛЕСО (ЧЕРЕДОВАНИЕ КРАСНЫЙ/ЧЁРНЫЙ)
        // ============================================================
        const segmentColors = [];
        const segments = 37;
        for (let i = 0; i < segments; i++) {
            if (i === 0) {
                segmentColors.push('green');
            } else {
                segmentColors.push(i % 2 === 0 ? 'red' : 'black');
            }
        }

        const numbers = [0, 32, 15, 19, 4, 21, 2, 25, 17, 34, 6, 27, 13, 36, 11, 30, 8, 23, 10, 5, 24, 16, 33, 1, 20, 14, 31,
            9, 22, 18, 29, 7, 28, 12, 35, 3, 26
        ];

        const wheel = document.getElementById('wheel');
        const segmentCount = segmentColors.length;
        const angleStep = 360 / segmentCount;

        segmentColors.forEach((color, i) => {
            const seg = document.createElement('div');
            seg.className = `wheel-segment ${color}`;
            seg.style.background = color === 'red' ? '#d63031' : color === 'black' ? '#111827' : '#27ae60';
            seg.style.transform = `rotate(${i * angleStep}deg)`;
            const dot = document.createElement('div');
            dot.className = 'dot';
            if (color === 'red') dot.style.background = 'rgba(255,255,255,0.25)';
            else if (color === 'black') dot.style.background = 'rgba(255,255,255,0.06)';
            else dot.style.background = 'rgba(255,255,255,0.4)';
            seg.appendChild(dot);
            wheel.appendChild(seg);
        });

        // ============================================================
        // 6. ИСТОРИЯ
        // ============================================================
        let history = [];

        function addHistory(num) {
            const color = num === 0 ? 'green' : (num % 2 === 0 ? 'red' : 'black');
            history.unshift({ num, color });
            if (history.length > 12) history.pop();
            renderHistory();
        }

        function renderHistory() {
            const container = document.getElementById('historyContainer');
            if (history.length === 0) {
                container.innerHTML = '<span style="color:rgba(255,255,255,0.1); font-size:12px;">История пуста</span>';
                return;
            }
            container.innerHTML = history.map(h =>
                `<div class="ball ${h.color}">${h.num}</div>`
            ).join('');
        }

        // ============================================================
        // 7. ВЫБОР СТАВКИ
        // ============================================================
        let betType = 'red';

        function selectBet(type) {
            betType = type;
            document.getElementById('betRed').className = type === 'red' ? 'active-red' : '';
            document.getElementById('betBlack').className = type === 'black' ? 'active-black' : '';
        }
        selectBet('red');

        // ============================================================
        // 8. ИГРА
        // ============================================================
        let isSpinning = false;
        let currentRotation = 0;

        function spinRoulette() {
            if (isSpinning) return;
            const bet = parseInt(document.getElementById('betInput').value) || 50;
            if (balance < bet) {
                showToast('❌ Недостаточно монет!');
                return;
            }

            isSpinning = true;
            document.getElementById('spinBtn').disabled = true;
            document.getElementById('spinBtn').textContent = '⏳ КРУТИТСЯ...';

            balance -= bet;
            updateBalance();

            const randomIndex = Math.floor(Math.random() * (segmentCount - 1)) + 1;
            const color = segmentColors[randomIndex];
            const num = numbers[randomIndex];

            const isWin = (betType === color);

            const winAngle = randomIndex * angleStep + angleStep / 2;
            const extraSpins = 5 + Math.floor(Math.random() * 5);
            const targetRotation = 360 * extraSpins + (360 - winAngle);

            currentRotation += targetRotation;
            wheel.classList.add('spinning');
            wheel.style.transform = `rotate(${currentRotation}deg)`;

            setTimeout(() => {
                wheel.classList.remove('spinning');

                const colorName = color === 'red' ? 'КРАСНОЕ' : color === 'black' ? 'ЧЁРНОЕ' : 'ЗЕЛЁНОЕ';
                const colorEmoji = color === 'red' ? '🔴' : color === 'black' ? '⚫' : '🟢';
                const colorClass = color === 'red' ? 'red' : color === 'black' ? 'black' : 'green';

                document.getElementById('resultNumber').textContent = num;
                document.getElementById('resultColor').className = `color-text ${colorClass}`;
                document.getElementById('resultColor').textContent = `${colorEmoji} ${colorName}`;

                addHistory(num);

                if (isWin) {
                    const winAmount = bet * 2;
                    balance += winAmount;
                    updateBalance();
                    document.getElementById('resultWin').textContent = `+${winAmount} 🪙`;
                    showToast('🎉 Выиграл ' + winAmount + ' монет!');
                    playWinSound();
                    launchConfetti();
                } else {
                    document.getElementById('resultWin').textContent = `-${bet} 🪙`;
                    showToast('😢 Проиграл ' + bet + ' монет');
                    playLoseSound();
                }

                isSpinning = false;
                document.getElementById('spinBtn').disabled = false;
                document.getElementById('spinBtn').textContent = '🎡 ИДЕТ ИГРА';
            }, 4200);
        }

        // ============================================================
        // 9. TOAST
        // ============================================================
        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.classList.add('show');
            clearTimeout(t._timeout);
            t._timeout = setTimeout(() => t.classList.remove('show'), 2400);
        }

        // ============================================================
        // 10. СТАРТ
        // ============================================================
        document.getElementById('resultNumber').textContent = '0';
        document.getElementById('resultColor').textContent = 'Сделай ставку';
        if (balance === 1000) {
            setTimeout(() => showToast('🎡 Добро пожаловать в рулетку!'), 400);
        }

        console.log('🎡 РУЛЕТКА загружена!');
        console.log('💰 Баланс:', balance);
        console.log('👆 Нажми "ИДЕТ ИГРА" для запуска!');
    </script>
</body>
</html>
