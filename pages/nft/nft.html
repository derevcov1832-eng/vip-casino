<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>💎 Хранилище NFT</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #0a0a1a;
            color: white;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 16px;
            position: relative;
        }

        .bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            background:
                radial-gradient(ellipse at 20% 30%, rgba(123, 77, 255, 0.06) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 70%, rgba(247, 212, 74, 0.03) 0%, transparent 50%);
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 480px;
            width: 100%;
            padding-bottom: 30px;
        }

        .back-btn {
            color: rgba(255, 255, 255, 0.3);
            text-decoration: none;
            font-size: 14px;
            padding: 6px 16px;
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: 40px;
            background: rgba(255, 255, 255, 0.02);
            display: inline-block;
            margin-bottom: 8px;
        }
        .back-btn:active {
            transform: scale(0.94);
        }

        .header h2 {
            font-size: 30px;
            font-weight: 800;
            background: linear-gradient(135deg, #b388ff, #7c4dff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 2px;
            text-align: center;
        }
        .header .sub {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.15);
            letter-spacing: 3px;
            text-transform: uppercase;
            text-align: center;
            margin-bottom: 12px;
        }

        .balance {
            font-size: 22px;
            font-weight: 600;
            color: #f7e3a0;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            padding: 8px 24px;
            border-radius: 60px;
            display: inline-block;
            border: 1px solid rgba(255, 255, 255, 0.04);
            margin: 0 auto 12px;
            text-align: center;
        }
        .balance-wrap {
            text-align: center;
        }

        .stats {
            display: flex;
            gap: 10px;
            margin: 8px 0 14px;
        }
        .stats .stat {
            flex: 1;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 14px;
            padding: 12px 8px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.03);
        }
        .stats .stat .num {
            font-size: 24px;
            font-weight: 700;
            color: #b388ff;
        }
        .stats .stat .lbl {
            font-size: 10px;
            color: rgba(255, 255, 255, 0.15);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 2px;
        }

        .nft-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin: 6px 0;
        }

        .nft-item {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(12px);
            border-radius: 14px;
            padding: 14px 16px;
            border: 1px solid rgba(255, 255, 255, 0.03);
            display: flex;
            align-items: center;
            gap: 14px;
            transition: 0.2s;
        }
        .nft-item:active {
            transform: scale(0.97);
            background: rgba(255, 255, 255, 0.04);
        }

        .nft-item .icon {
            font-size: 34px;
            width: 50px;
            text-align: center;
            flex-shrink: 0;
        }
        .nft-item .info {
            flex: 1;
            text-align: left;
        }
        .nft-item .info .name {
            font-size: 16px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.9);
        }
        .nft-item .info .rarity {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 1px;
        }
        .nft-item .info .rarity.common {
            color: #b0b0b0;
        }
        .nft-item .info .rarity.rare {
            color: #4CAF50;
        }
        .nft-item .info .rarity.epic {
            color: #2196F3;
        }
        .nft-item .info .rarity.legendary {
            color: #9C27B0;
        }
        .nft-item .info .rarity.mythic {
            color: #FF5722;
        }
        .nft-item .date {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.12);
            flex-shrink: 0;
        }

        .empty {
            text-align: center;
            padding: 40px 20px;
            color: rgba(255, 255, 255, 0.08);
        }
        .empty .icon {
            font-size: 56px;
            display: block;
            margin-bottom: 8px;
            opacity: 0.3;
        }
        .empty .text {
            font-size: 16px;
            color: rgba(255, 255, 255, 0.15);
        }
        .empty .sub {
            font-size: 12px;
            margin-top: 4px;
            color: rgba(255, 255, 255, 0.06);
        }

        .footer {
            text-align: center;
            margin-top: 16px;
            font-size: 11px;
            color: rgba(255, 255, 255, 0.04);
            letter-spacing: 2px;
        }

        /* ===== НИЖНЯЯ НАВИГАЦИЯ ===== */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(10, 10, 26, 0.92);
            backdrop-filter: blur(16px);
            border-top: 1px solid rgba(255, 255, 255, 0.03);
            display: flex;
            justify-content: space-around;
            padding: 8px 0 12px;
            max-width: 480px;
            margin: 0 auto;
            z-index: 100;
        }
        .bottom-nav .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            text-decoration: none;
            color: rgba(255, 255, 255, 0.15);
            font-size: 9px;
            font-weight: 500;
            letter-spacing: 0.5px;
            transition: 0.3s;
            background: none;
            border: none;
            cursor: pointer;
            padding: 4px 16px;
        }
        .bottom-nav .nav-item .icon {
            font-size: 22px;
            transition: 0.3s;
        }
        .bottom-nav .nav-item.active {
            color: #f7d44a;
        }
        .bottom-nav .nav-item.active .icon {
            transform: translateY(-2px);
        }
        .bottom-nav .nav-item:active {
            transform: scale(0.9);
        }

        @media (max-width: 450px) {
            .stats .stat .num {
                font-size: 20px;
            }
            .nft-item .icon {
                font-size: 28px;
                width: 40px;
            }
            .nft-item .info .name {
                font-size: 14px;
            }
            .balance {
                font-size: 19px;
                padding: 6px 20px;
            }
        }
    </style>
</head>
<body>

    <div class="bg"></div>

    <div class="container">
        <a href="../home/home.html" class="back-btn">← Назад</a>

        <div class="header">
            <h2>💎 Хранилище NFT</h2>
            <div class="sub">Твои коллекционные карточки</div>
        </div>

        <div class="balance-wrap">
            <div class="balance" id="balanceDisplay">💰 1000</div>
        </div>

        <div class="stats">
            <div class="stat">
                <div class="num" id="totalNFT">0</div>
                <div class="lbl">Всего NFT</div>
            </div>
            <div class="stat">
                <div class="num" id="rarestNFT">—</div>
                <div class="lbl">Редчайший</div>
            </div>
        </div>

        <div class="nft-list" id="nftList">
            <div class="empty">
                <span class="icon">📭</span>
                <div class="text">У тебя пока нет NFT</div>
                <div class="sub">Играй в монетку, чтобы получить NFT!</div>
            </div>
        </div>

        <div class="footer">NFT выпадают при победе в монетке</div>
    </div>

    <!-- ===== НИЖНЯЯ НАВИГАЦИЯ ===== -->
    <div class="bottom-nav" id="bottomNav">
        <button class="nav-item" onclick="window.location.href='../home/home.html'">
            <span class="icon">🏠</span> Главная
        </button>
        <button class="nav-item" onclick="window.location.href='../games/games.html'">
            <span class="icon">🎮</span> Игры
        </button>
        <button class="nav-item active" onclick="window.location.href='../nft/nft.html'">
            <span class="icon">💎</span> Хранилище
        </button>
        <button class="nav-item" onclick="window.location.href='../profile/profile.html'">
            <span class="icon">👤</span> Профиль
        </button>
    </div>

    <script>
        // ============================
        // 1. БАЛАНС
        // ============================
        let balance = parseInt(localStorage.getItem('casinoBalance')) || 1000;
        document.getElementById('balanceDisplay').textContent = '💰 ' + balance;

        // ============================
        // 2. ПОЛУЧАЕМ NFT ИЗ ХРАНИЛИЩА
        // ============================
        function getUserNFTs() {
            try {
                return JSON.parse(localStorage.getItem('userNFTs')) || [];
            } catch {
                return [];
            }
        }

        // ============================
        // 3. РЕДКОСТИ
        // ============================
        const rarityOrder = {
            common: 0,
            rare: 1,
            epic: 2,
            legendary: 3,
            mythic: 4
        };

        const rarityNames = {
            common: 'Обычный',
            rare: 'Редкий',
            epic: 'Эпический',
            legendary: 'Легендарный',
            mythic: 'Мифический'
        };

        const rarityColors = {
            common: '#b0b0b0',
            rare: '#4CAF50',
            epic: '#2196F3',
            legendary: '#9C27B0',
            mythic: '#FF5722'
        };

        // ============================
        // 4. ОТОБРАЖЕНИЕ NFT
        // ============================
        function renderNFTs() {
            const nfts = getUserNFTs();
            const list = document.getElementById('nftList');
            const totalEl = document.getElementById('totalNFT');
            const rarestEl = document.getElementById('rarestNFT');

            totalEl.textContent = nfts.length;

            if (nfts.length === 0) {
                list.innerHTML = `
                    <div class="empty">
                        <span class="icon">📭</span>
                        <div class="text">У тебя пока нет NFT</div>
                        <div class="sub">Играй в монетку, чтобы получить NFT!</div>
                    </div>
                `;
                rarestEl.textContent = '—';
                return;
            }

            const sorted = [...nfts].sort((a, b) => {
                return rarityOrder[b.rarity] - rarityOrder[a.rarity];
            });

            const rarest = sorted[0];
            rarestEl.textContent = rarest.emoji + ' ' + rarest.name;

            list.innerHTML = sorted.map(nft => `
                <div class="nft-item">
                    <div class="icon">${nft.emoji}</div>
                    <div class="info">
                        <div class="name" style="color: ${rarityColors[nft.rarity]}">${nft.name}</div>
                        <div class="rarity ${nft.rarity}">${rarityNames[nft.rarity]}</div>
                    </div>
                    <div class="date">${new Date(nft.obtained).toLocaleDateString()}</div>
                </div>
            `).join('');
        }

        // ============================
        // 5. ЗАПУСК
        // ============================
        renderNFTs();

        // Обновляем при возврате на страницу
        window.addEventListener('focus', renderNFTs);

        console.log('💎 Хранилище NFT загружено!');
        console.log('📦 Всего NFT:', getUserNFTs().length);
    </script>
</body>
</html>
