
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>💎 Хранилище NFT</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #0a0a1a;
            color: white;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 16px;
            position: relative;
        }

        .bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            background:
                radial-gradient(ellipse at 20% 30%, rgba(123, 77, 255, 0.06) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 70%, rgba(247, 212, 74, 0.03) 0%, transparent 50%);
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 480px;
            width: 100%;
            padding-bottom: 30px;
        }

        .back-btn {
            color: rgba(255, 255, 255, 0.3);
            text-decoration: none;
            font-size: 14px;
            padding: 6px 16px;
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: 40px;
            background: rgba(255, 255, 255, 0.02);
            display: inline-block;
            margin-bottom: 8px;
        }
        .back-btn:active {
            transform: scale(0.94);
        }

        .header h2 {
            font-size: 30px;
            font-weight: 800;
            background: linear-gradient(135deg, #b388ff, #7c4dff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 2px;
            text-align: center;
        }
        .header .sub {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.15);
            letter-spacing: 3px;
            text-transform: uppercase;
            text-align: center;
            margin-bottom: 12px;
        }

        .balance {
            font-size: 22px;
            font-weight: 600;
            color: #f7e3a0;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            padding: 8px 24px;
            border-radius: 60px;
            display: inline-block;
            border: 1px solid rgba(255, 255, 255, 0.04);
            margin: 0 auto 12px;
            text-align: center;
        }
        .balance-wrap {
            text-align: center;
        }

        .stats {
            display: flex;
            gap: 10px;
            margin: 8px 0 14px;
        }
        .stats .stat {
            flex: 1;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 14px;
            padding: 12px 8px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.03);
        }
        .stats .stat .num {
            font-size: 24px;
            font-weight: 700;
            color: #b388ff;
        }
        .stats .stat .lbl {
            font-size: 10px;
            color: rgba(255, 255, 255, 0.15);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 2px;
        }

        .nft-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin: 6px 0;
        }

        .nft-item {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(12px);
            border-radius: 14px;
            padding: 14px 16px;
            border: 1px solid rgba(255, 255, 255, 0.03);
            display: flex;
            align-items: center;
            gap: 14px;
            transition: 0.2s;
        }
        .nft-item:active {
            transform: scale(0.97);
            background: rgba(255, 255, 255, 0.04);
        }
