<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🐰 Rabbits — Главная</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #0a0a1a;
            color: white;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 20px;
            position: relative;
        }

        .bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            background:
                radial-gradient(ellipse at 20% 30%, rgba(180, 80, 255, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 70%, rgba(255, 50, 50, 0.05) 0%, transparent 50%);
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 480px;
            width: 100%;
            padding-bottom: 80px;
        }

        /* ===== ХЕДЕР ===== */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
        }
        .header .logo {
            font-size: 20px;
            font-weight: 800;
            color: #f7d44a;
            letter-spacing: 0.5px;
        }
        .header .coins {
            display: flex;
            align-items: center;
            gap: 6px;
            background: rgba(255, 255, 255, 0.03);
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 14px;
            font-weight: 700;
            color: #f7d44a;
            border: 1px solid rgba(255, 255, 255, 0.04);
        }

        /* ===== БАЛАНС ===== */
        .balance-block {
            text-align: center;
            padding: 12px 0 8px;
        }
        .balance-block .amount {
            font-size: 38px;
            font-weight: 800;
            color: #f7d44a;
            text-shadow: 0 0 40px rgba(247, 212, 74, 0.1);
            letter-spacing: 1px;
        }
        .balance-block .label {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.15);
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-top: 2px;
        }

        /* ===== LIVE ===== */
        .live-badge {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin: 6px 0 10px;
            padding: 6px 16px;
            background: rgba(231, 76, 60, 0.08);
            border-radius: 40px;
            border: 1px solid rgba(231, 76, 60, 0.1);
            font-size: 13px;
            font-weight: 600;
            color: #e74c3c;
            letter-spacing: 2px;
        }
        .live-badge .dot {
            width: 8px;
            height: 8px;
            background: #e74c3c;
            border-radius: 50%;
            animation: livePulse 1.2s ease-in-out infinite;
        }
        @keyframes livePulse {
            0%,
            100% {
                opacity: 1;
                transform: scale(1);
            }
            50% {
                opacity: 0.3;
                transform: scale(0.6);
            }
        }
        .live-badge .num {
            font-size: 16px;
            font-weight: 700;
            color: #f7d44a;
        }

        /* ===== КЕЙСЫ ===== */
        .cases-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin: 12px 0;
        }
        .case-card {
            background: rgba(255, 255, 255, 0.02);
            border-radius: 16px;
            padding: 18px 20px;
            border: 1px solid rgba(255, 255, 255, 0.03);
            display: flex;
            align-items: center;
            gap: 16px;
            cursor: pointer;
            transition: 0.3s;
        }
        .case-card:active {
            transform: scale(0.96);
            background: rgba(255, 255, 255, 0.04);
        }
        .case-card .icon {
            font-size: 36px;
            width: 56px;
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 14px;
            flex-shrink: 0;
        }
        .case-card .info {
            flex: 1;
            text-align: left;
        }
        .case-card .info .name {
            font-size: 16px;
            font-weight: 700;
        }
        .case-card .info .desc {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.2);
        }
        .case-card .badge {
            padding: 2px 12px;
            border-radius: 40px;
            font-size: 10px;
            font-weight: 600;
            background: rgba(247, 212, 74, 0.08);
            color: #f7d44a;
            border: 1px solid rgba(247, 212, 74, 0.05);
        }
        .case-card .arrow {
            font-size: 20px;
            color: rgba(255, 255, 255, 0.05);
        }

        /* ===== СТРОКА С ПОДАРКАМИ ===== */
        .case-reward {
            display: none;
            text-align: center;
            padding: 12px;
            margin: 10px 0;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 14px;
            border: 1px solid rgba(255, 255, 255, 0.04);
            animation: rewardSlide 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .case-reward.show {
            display: block;
        }
        .case-reward .emoji {
            font-size: 32px;
            display: block;
        }
        .case-reward .text {
            font-size: 16px;
            font-weight: 600;
            color: #f7d44a;
            margin-top: 4px;
        }
        .case-reward .sub {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.2);
        }

        @keyframes rewardSlide {
            0% {
                opacity: 0;
                transform: translateY(-20px) scale(0.8);
            }
            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        /* ===== КНОПКА ИГРАТЬ ===== */
        .play-btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 16px;
            background: linear-gradient(145deg, #f7d44a, #dbb84a);
            color: #1a1a2e;
            font-size: 18px;
            font-weight: 800;
            letter-spacing: 3px;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 6px 30px rgba(247, 212, 74, 0.1);
            margin: 6px 0 10px;
        }
        .play-btn:active {
            transform: scale(0.96);
            box-shadow: 0 6px 40px rgba(247, 212, 74, 0.15);
        }

        .footer {
            text-align: center;
            margin-top: 16px;
            font-size: 10px;
            color: rgba(255, 255, 255, 0.04);
            letter-spacing: 3px;
        }

        @media (max-width: 400px) {
            .balance-block .amount {
                font-size: 30px;
            }
            .case-card {
                padding: 14px 16px;
            }
            .case-card .icon {
                font-size: 28px;
                width: 44px;
                height: 44px;
            }
            .play-btn {
                font-size: 16px;
                padding: 14px;
            }
        }
    </style>
</head>
<body>

    <div class="bg"></div>

    <div class="container">

        <!-- ===== ХЕДЕР ===== -->
        <div class="header">
            <div class="logo">🐰 Rabbits</div>
            <div class="coins">
                <span>⭐</span>
                <span id="headerStars">0</span>
            </div>
        </div>

        <!-- ===== БАЛАНС ===== -->
        <div class="balance-block">
            <div class="amount" id="balanceDisplay">1000</div>
            <div class="label">💰 Игровой баланс</div>
        </div>

        <!-- ===== LIVE ===== -->
        <div class="live-badge">
            <span class="dot"></span>
            LIVE <span class="num" id="liveCount">0.5</span>
        </div>

        <!-- ===== КЕЙСЫ ===== -->
        <div class="cases-grid">
            <div class="case-card" onclick="openCase()">
                <div class="icon">💎</div>
                <div class="info">
                    <div class="name">Кейс за депозит</div>
                    <div class="desc">Пополни баланс и открой кейс</div>
                </div>
                <div class="badge">⭐</div>
                <div class="arrow">›</div>
            </div>
        </div>

        <!-- ===== СТРОКА С ПОДАРКАМИ ===== -->
        <div class="case-reward" id="caseReward">
            <span class="emoji" id="rewardEmoji">🎉</span>
            <div class="text" id="rewardText">+0 монет</div>
            <div class="sub" id="rewardSub">Подарок получен!</div>
        </div>

        <!-- ===== КНОПКА ИГРАТЬ ===== -->
        <button class="play-btn" onclick="window.location.href='../../games.html'">
            🎮 ИГРАТЬ! <span style="display:inline-block;transition:0.3s;">→</span>
        </button>

        <div class="footer">Сделано с ❤️ в Telegram Mini App</div>

    </div>

    <script>
        // ============================================================
        // 1. БАЛАНС
        // ============================================================
        let balance = parseInt(localStorage.getItem('casinoBalance')) || 1000;

        function updateAllBalances() {
            document.getElementById('balanceDisplay').textContent = balance;
            document.getElementById('headerStars').textContent = Math.floor(balance / 10);
            localStorage.setItem('casinoBalance', balance);
        }
        updateAllBalances();

        // ============================================================
        // 2. LIVE
        // ============================================================
        function updateLive() {
            const live = (Math.random() * 2 + 0.1).toFixed(1);
            document.getElementById('liveCount').textContent = live;
        }
        setInterval(updateLive, 3000);

        // ============================================================
        // 3. КЕЙСЫ
        // ============================================================
        function openCase() {
            const reward = Math.floor(Math.random() * 150) + 50;

            const rewardEl = document.getElementById('caseReward');
            document.getElementById('rewardEmoji').textContent = '💎';
            document.getElementById('rewardText').textContent = '+' + reward + ' монет';
            document.getElementById('rewardSub').textContent = 'Кейс за депозит открыт!';
            rewardEl.classList.add('show');

            balance += reward;
            updateAllBalances();

            clearTimeout(window.rewardTimeout);
            window.rewardTimeout = setTimeout(() => {
                rewardEl.classList.remove('show');
            }, 3000);

            showToast('💎 Кейс за депозит +' + reward + ' монет!', true);
        }

        // ============================================================
        // 4. TOAST
        // ============================================================
        function showToast(msg, isWin = true) {
            const toast = document.createElement('div');
            toast.style.cssText = `
                    position: fixed; top: 80px; left: 50%; transform: translateX(-50%);
                    background: rgba(12,14,28,0.92); backdrop-filter: blur(16px);
                    color: #f0eee0; padding: 12px 24px; border-radius: 60px; z-index: 9999;
                    max-width: 90%; border: 1px solid ${isWin ? 'rgba(247,212,74,0.1)' : 'rgba(231,76,60,0.1)'};
                    font-size: 15px; font-weight: 500;
                    box-shadow: 0 16px 50px rgba(0,0,0,0.3);
                    animation: fadeIn 0.35s ease-out;
                `;
            toast.textContent = msg;
            document.body.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transition = 'opacity 0.3s';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        // ============================================================
        // 5. СТАРТ
        // ============================================================
        if (balance === 1000) {
            setTimeout(() => showToast('🐰 Добро пожаловать в Rabbits!'), 400);
        }

        console.log('🐰 Главная страница загружена!');
        console.log('💰 Баланс:', balance);
    </script>
</body>
</html>
