<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🎰 VIP Casino</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: #0a0a1a;
            color: white;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 16px;
            position: relative;
            overflow-x: hidden;
        }

        .bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            background:
                radial-gradient(ellipse at 20% 30%, rgba(180, 80, 255, 0.08) 0%, transparent 55%),
                radial-gradient(ellipse at 80% 70%, rgba(255, 50, 50, 0.05) 0%, transparent 50%);
            animation: bgPulse 6s ease-in-out infinite alternate;
        }

        @keyframes bgPulse {
            0% { opacity: 0.7; transform: scale(1); }
            100% { opacity: 1; transform: scale(1.02); }
        }

        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
        }
        .particle {
            position: absolute;
            width: 3px;
            height: 3px;
            background: rgba(247, 212, 74, 0.15);
            border-radius: 50%;
            animation: floatParticle linear infinite;
        }
        .particle:nth-child(1) { left: 10%; animation-duration: 14s; }
        .particle:nth-child(2) { left: 25%; animation-duration: 18s; animation-delay: 2s; }
        .particle:nth-child(3) { left: 40%; animation-duration: 12s; animation-delay: 4s; }
        .particle:nth-child(4) { left: 55%; animation-duration: 16s; animation-delay: 1s; }
        .particle:nth-child(5) { left: 70%; animation-duration: 13s; animation-delay: 3s; }
        .particle:nth-child(6) { left: 85%; animation-duration: 19s; animation-delay: 5s; }
        .particle:nth-child(7) { left: 50%; animation-duration: 15s; animation-delay: 2.5s; }
        .particle:nth-child(8) { left: 15%; animation-duration: 20s; animation-delay: 1.5s; }

        @keyframes floatParticle {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-10vh) scale(1); opacity: 0; }
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 480px;
            width: 100%;
            padding-bottom: 30px;
        }

        /* ===== ХЕДЕР ===== */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
            margin-bottom: 6px;
        }
        .header .logo {
            font-size: 22px;
            font-weight: 800;
            background: linear-gradient(135deg, #f7d44a, #ff6b6b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 0.5px;
        }
        .header .right {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .header .coins {
            display: flex;
            align-items: center;
            gap: 4px;
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(12px);
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 14px;
            font-weight: 700;
            color: #f7d44a;
            border: 1px solid rgba(255, 255, 255, 0.04);
            cursor: pointer;
            transition: 0.2s;
        }
        .header .coins:active {
            transform: scale(0.94);
            background: rgba(255, 255, 255, 0.08);
        }
        .header .coins span {
            font-size: 14px;
        }
        .header .deposit-btn {
            background: rgba(247, 212, 74, 0.08);
            border: 1px solid rgba(247, 212, 74, 0.1);
            border-radius: 40px;
            padding: 4px 12px;
            font-size: 14px;
            font-weight: 700;
            color: #f7d44a;
            cursor: pointer;
            transition: 0.2s;
            backdrop-filter: blur(12px);
        }
        .header .deposit-btn:active {
            transform: scale(0.94);
            background: rgba(247, 212, 74, 0.15);
        }

        /* ===== LIVE ===== */
        .live-badge {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin: 4px 0 16px;
            padding: 6px 18px;
            background: rgba(231, 76, 60, 0.06);
            border-radius: 40px;
            border: 1px solid rgba(231, 76, 60, 0.08);
            font-size: 14px;
            font-weight: 600;
            color: #e74c3c;
            letter-spacing: 2px;
            backdrop-filter: blur(8px);
        }
        .live-badge .dot {
            width: 8px;
            height: 8px;
            background: #e74c3c;
            border-radius: 50%;
            animation: livePulse 1.2s ease-in-out infinite;
            box-shadow: 0 0 20px rgba(231, 76, 60, 0.2);
        }
        @keyframes livePulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.2; transform: scale(0.5); }
        }
        .live-badge .num {
            font-size: 18px;
            font-weight: 700;
            color: #f7d44a;
            min-width: 30px;
        }

        /* ===== КНОПКИ В РЯД ===== */
        .row-buttons {
            display: flex;
            gap: 12px;
            margin: 8px 0 4px;
        }

        .big-btn {
            flex: 1;
            aspect-ratio: 1/1;
            border: none;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 6px;
            font-size: 18px;
            font-weight: 800;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 6px 30px rgba(0, 0, 0, 0.2);
            position: relative;
            overflow: hidden;
        }
        .big-btn:active {
            transform: scale(0.94);
        }
        .big-btn .icon {
            font-size: 36px;
        }
        .big-btn .arrow {
            font-size: 20px;
            opacity: 0.3;
            transition: 0.3s;
        }
        .big-btn:active .arrow {
            transform: translateX(6px);
            opacity: 0.6;
        }

        .big-btn.play {
            background: linear-gradient(145deg, #f7d44a, #dbb84a);
            color: #1a1a2e;
            box-shadow: 0 6px 40px rgba(247, 212, 74, 0.08);
        }
        .big-btn.play::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.1) 0%, transparent 60%);
            pointer-events: none;
        }

        .big-btn.cases {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.04);
            color: white;
        }

        /* ===== НИЖНЯЯ НАВИГАЦИЯ ===== */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(10, 10, 26, 0.92);
            backdrop-filter: blur(16px);
            border-top: 1px solid rgba(255, 255, 255, 0.03);
            display: flex;
            justify-content: space-around;
            padding: 8px 0 12px;
            max-width: 480px;
            margin: 0 auto;
            z-index: 100;
        }
        .bottom-nav .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            text-decoration: none;
            color: rgba(255, 255, 255, 0.15);
            font-size: 9px;
            font-weight: 500;
            letter-spacing: 0.5px;
            transition: 0.3s;
            background: none;
            border: none;
            cursor: pointer;
            padding: 4px 16px;
        }
        .bottom-nav .nav-item .icon {
            font-size: 22px;
            transition: 0.3s;
        }
        .bottom-nav .nav-item.active {
            color: #f7d44a;
        }
        .bottom-nav .nav-item.active .icon {
            transform: translateY(-2px);
        }
        .bottom-nav .nav-item:active {
            transform: scale(0.9);
        }

        /* ===== ОВЕРЛЕЙ ПОПОЛНЕНИЯ ===== */
        .deposit-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(20px);
            z-index: 300;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            padding: 20px;
        }
        .deposit-overlay.show {
            display: flex;
            animation: fadeIn 0.3s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        .deposit-card {
            max-width: 400px;
            width: 100%;
            background: linear-gradient(145deg, #1a1f35, #0d1225);
            border-radius: 24px;
            padding: 28px 24px;
            border: 1px solid rgba(255, 255, 255, 0.04);
            box-shadow: 0 20px 80px rgba(0, 0, 0, 0.5);
            text-align: center;
        }
        .deposit-card .title {
            font-size: 24px;
            font-weight: 700;
            color: #f7d44a;
            margin-bottom: 4px;
        }
        .deposit-card .sub {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.2);
            margin-bottom: 20px;
        }
        .deposit-card .balance-show {
            font-size: 36px;
            font-weight: 800;
            color: #f7d44a;
            margin-bottom: 16px;
            padding: 12px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.03);
        }

        .deposit-options {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin: 16px 0;
        }
        .deposit-options .option {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 18px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 14px;
            border: 1px solid rgba(255, 255, 255, 0.03);
            cursor: pointer;
            transition: 0.3s;
        }
        .deposit-options .option:active {
            transform: scale(0.96);
            background: rgba(255, 255, 255, 0.04);
        }
        .deposit-options .option .left {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .deposit-options .option .left .icon {
            font-size: 28px;
        }
        .deposit-options .option .left .info .name {
            font-size: 15px;
            font-weight: 600;
        }
        .deposit-options .option .left .info .desc {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.2);
        }
        .deposit-options .option .right {
            font-size: 16px;
            font-weight: 700;
            color: #f7d44a;
        }

        .deposit-close {
            margin-top: 16px;
            padding: 12px;
            border: none;
            border-radius: 40px;
            background: rgba(255, 255, 255, 0.03);
            color: rgba(255, 255, 255, 0.2);
            font-size: 14px;
            cursor: pointer;
            width: 100%;
            border: 1px solid rgba(255, 255, 255, 0.03);
            transition: 0.3s;
        }
        .deposit-close:active {
            transform: scale(0.94);
        }

        @media (max-width: 400px) {
            .big-btn {
                font-size: 15px;
                border-radius: 16px;
            }
            .big-btn .icon {
                font-size: 28px;
            }
            .header .logo {
                font-size: 18px;
            }
            .live-badge {
                font-size: 12px;
                padding: 4px 14px;
            }
            .live-badge .num {
                font-size: 15px;
            }
        }
    </style>
</head>
<body>

    <div class="bg"></div>

    <div class="particles">
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
    </div>

    <div class="container">

        <!-- ===== ХЕДЕР ===== -->
        <div class="header">
            <div class="logo">🎰 VIP CASINO</div>
            <div class="right">
                <div class="coins" onclick="openDeposit()">
                    <span>⭐</span>
                    <span id="headerStars">100</span>
                </div>
                <div class="deposit-btn" onclick="openDeposit()">➕</div>
            </div>
        </div>

        <!-- ===== LIVE ===== -->
        <div class="live-badge">
            <span class="dot"></span>
            LIVE <span class="num" id="liveCount">0.5</span>
        </div>

        <!-- ===== КНОПКИ ===== -->
        <div class="row-buttons">
            <button class="big-btn play" onclick="window.location.href='../../games.html'">
                <span class="icon">🎮</span>
                ИГРАТЬ!
                <span class="arrow">→</span>
            </button>
            <button class="big-btn cases" onclick="window.location.href='../../pages/cases/cases.html'">
                <span class="icon">📦</span>
                КЕЙСЫ
                <span class="arrow">→</span>
            </button>
        </div>

    </div>

    <!-- ===== НИЖНЯЯ НАВИГАЦИЯ ===== -->
    <div class="bottom-nav" id="bottomNav">
        <button class="nav-item active" onclick="window.location.href='../../index.html'">
            <span class="icon">🏠</span>
            Главная
        </button>
        <button class="nav-item" onclick="window.location.href='../../games.html'">
            <span class="icon">🎮</span>
            Игры
        </button>
        <button class="nav-item" onclick="window.location.href='../../nft.html'">
            <span class="icon">💎</span>
            Хранилище
        </button>
        <button class="nav-item" onclick="window.location.href='../../profile.html'">
            <span class="icon">👤</span>
            Профиль
        </button>
    </div>

    <!-- ===== ОВЕРЛЕЙ ПОПОЛНЕНИЯ ===== -->
    <div class="deposit-overlay" id="depositOverlay">
        <div class="deposit-card">
            <div class="title">⭐ Пополнить баланс</div>
            <div class="sub">Купи монеты за Telegram Stars</div>
            <div class="balance-show"><span>💰</span> <span id="depositBalance">1000</span></div>
            <div class="deposit-options">
                <div class="option" onclick="buyCoins(10, 100)">
                    <div class="left">
                        <div class="icon">⭐</div>
                        <div class="info">
                            <div class="name">10 Stars</div>
                            <div class="desc">+100 монет</div>
                        </div>
                    </div>
                    <div class="right">+100</div>
                </div>
                <div class="option" onclick="buyCoins(25, 300)">
                    <div class="left">
                        <div class="icon">⭐</div>
                        <div class="info">
                            <div class="name">25 Stars</div>
                            <div class="desc">+300 монет</div>
                        </div>
                    </div>
                    <div class="right">+300</div>
                </div>
                <div class="option" onclick="buyCoins(50, 700)" style="border-color: rgba(247,212,74,0.15); background: rgba(247,212,74,0.04);">
                    <div class="left">
                        <div class="icon">⭐</div>
                        <div class="info">
                            <div class="name">50 Stars</div>
                            <div class="desc">+700 монет</div>
                        </div>
                    </div>
                    <div class="right" style="color:#f7d44a;">🔥 +700</div>
                </div>
                <div class="option" onclick="buyCoins(100, 1500)">
                    <div class="left">
                        <div class="icon">⭐</div>
                        <div class="info">
                            <div class="name">100 Stars</div>
                            <div class="desc">+1500 монет</div>
                        </div>
                    </div>
                    <div class="right">+1500</div>
                </div>
            </div>
            <button class="deposit-close" onclick="closeDeposit()">✕ Закрыть</button>
        </div>
    </div>

    <script>
        // ============================================================
        // 1. БАЛАНС
        // ============================================================
        let balance = parseInt(localStorage.getItem('casinoBalance')) || 1000;

        function updateAllBalances() {
            document.getElementById('headerStars').textContent = Math.floor(balance / 10);
            document.getElementById('depositBalance').textContent = balance;
            localStorage.setItem('casinoBalance', balance);
        }
        updateAllBalances();

        // ============================================================
        // 2. LIVE
        // ============================================================
        function updateLive() {
            const live = (Math.random() * 2 + 0.1).toFixed(1);
            document.getElementById('liveCount').textContent = live;
        }
        setInterval(updateLive, 3000);

        // ============================================================
        // 3. ПОПОЛНЕНИЕ
        // ============================================================
        function openDeposit() {
            document.getElementById('depositOverlay').classList.add('show');
            document.getElementById('depositBalance').textContent = balance;
        }

        function closeDeposit() {
            document.getElementById('depositOverlay').classList.remove('show');
        }

        function buyCoins(starsCost, coinsAmount) {
            if (window.Telegram && window.Telegram.WebApp) {
                window.Telegram.WebApp.sendData(JSON.stringify({
                    action: 'buy_coins',
                    stars: starsCost,
                    coins: coinsAmount
                }));
                showToast(`⏳ Запрос на ${coinsAmount} монет за ${starsCost} Stars...`);
            } else {
                balance += coinsAmount;
                updateAllBalances();
                closeDeposit();
                showToast(`✅ +${coinsAmount} монет (демо)`);
            }
        }

        // ============================================================
        // 4. TOAST
        // ============================================================
        function showToast(msg, isWin = true) {
            const toast = document.createElement('div');
            toast.style.cssText = `
                    position: fixed; top: 80px; left: 50%; transform: translateX(-50%);
                    background: rgba(12,14,28,0.92); backdrop-filter: blur(16px);
                    color: #f0eee0; padding: 12px 24px; border-radius: 60px; z-index: 9999;
                    max-width: 90%; border: 1px solid ${isWin ? 'rgba(247,212,74,0.1)' : 'rgba(231,76,60,0.1)'};
                    font-size: 15px; font-weight: 500;
                    box-shadow: 0 16px 50px rgba(0,0,0,0.3);
                    animation: fadeIn 0.35s ease-out;
                `;
            toast.textContent = msg;
            document.body.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transition = 'opacity 0.3s';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        // ============================================================
        // 5. СТАРТ
        // ============================================================
        if (balance === 1000) {
            setTimeout(() => showToast('🎰 Добро пожаловать в VIP Casino!'), 400);
        }

        console.log('🎰 VIP Casino загружена!');
        console.log('💰 Баланс:', balance);
    </script>
</body>
</html>
